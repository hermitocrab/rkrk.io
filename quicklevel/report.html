<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickLevel - Proficiency Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif; }
        .download-btn { width: 100%; max-width: 280px; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-zinc-900 text-gray-900 dark:text-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-4xl mx-auto bg-white dark:bg-zinc-800 p-6 md:p-8 rounded-lg shadow-lg">
        <h1 class="text-2xl md:text-4xl font-bold tracking-tighter text-center">你的英语水平报告</h1>
        <p class="text-center text-gray-500 text-sm mt-1">Your English Proficiency Report</p>
        <div class="grid md:grid-cols-2 gap-6 mt-6">
            <div class="text-center">
                <h2 class="text-lg font-bold mb-2 text-gray-500">CEFR 等级</h2>
                <div id="cefr-result" class="text-6xl font-bold text-blue-600"></div>
            </div>
            <div class="flex flex-col justify-center gap-3">
                <div class="flex justify-between text-sm">
                    <span>语法/词汇</span>
                    <span id="grammar-score" class="font-bold"></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span>阅读理解</span>
                    <span id="reading-score" class="font-bold"></span>
                </div>
                <div class="flex justify-between text-sm">
                    <span>听力理解</span>
                    <span id="listening-score" class="font-bold"></span>
                </div>
                <div class="flex justify-between text-sm pt-2 border-t border-gray-200 dark:border-zinc-700">
                    <span>总分</span>
                    <span id="total-score" class="font-bold text-blue-600"></span>
                </div>
            </div>
        </div>
        <div class="mt-6">
            <canvas id="skill-chart" class="max-w-xs mx-auto"></canvas>
        </div>
        <div class="mt-6 p-4 bg-blue-50 dark:bg-blue-900/20 rounded-lg">
            <h2 class="text-lg font-bold mb-2">学习建议</h2>
            <div id="recommendations" class="text-sm leading-relaxed"></div>
        </div>
        <div class="mt-6 text-center">
            <button id="download-btn" class="download-btn bg-blue-600 text-white px-5 py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors text-sm inline-block">下载成绩单 JPG</button>
            <p id="brand-note" class="text-xs text-gray-400 mt-2"></p>
        </div>
    </div>

    <script>
        const sessionId = window.location.pathname.split('/').pop();
        const cefrResult = document.getElementById('cefr-result');
        const grammarScore = document.getElementById('grammar-score');
        const readingScore = document.getElementById('reading-score');
        const listeningScore = document.getElementById('listening-score');
        const totalScore = document.getElementById('total-score');
        const recommendations = document.getElementById('recommendations');
        const skillChart = document.getElementById('skill-chart');
        let reportData = null;

        async function fetchReport() {
            const response = await fetch(`/quicklevel/api/result/${sessionId}`);
            const data = await response.json();
            
            cefrResult.innerText = data.cefr;

            const grammarAnswers = data.answers.filter(a => [1,2,5,6,7,10,11,12,15,16,17,20,21,22,25,26,27,30].includes(a.questionId));
            const readingAnswers = data.answers.filter(a => [4,9,14,19,24,29].includes(a.questionId));
            const listeningAnswers = data.answers.filter(a => [3,8,13,18,23,28].includes(a.questionId));

            const g = grammarAnswers.filter(a => a.isCorrect).length;
            const r = readingAnswers.filter(a => a.isCorrect).length;
            const l = listeningAnswers.filter(a => a.isCorrect).length;

            grammarScore.innerText = `${g} / ${grammarAnswers.length}`;
            readingScore.innerText = `${r} / ${readingAnswers.length}`;
            listeningScore.innerText = `${l} / ${listeningAnswers.length}`;
            totalScore.innerText = `${data.score} / ${data.total}`;

            setRecommendations(data.cefr);
            
            new Chart(skillChart, {
                type: 'radar',
                data: {
                    labels: ['语法 Grammar', '词汇 Vocabulary', '阅读 Reading', '听力 Listening'],
                    datasets: [{
                        data: [
                            Math.round(g / Math.max(grammarAnswers.length, 1) * 100),
                            Math.round(data.score / data.total * 100),
                            Math.round(r / Math.max(readingAnswers.length, 1) * 100),
                            Math.round(l / Math.max(listeningAnswers.length, 1) * 100)
                        ],
                        backgroundColor: 'rgba(59, 130, 246, 0.15)',
                        borderColor: 'rgba(59, 130, 246, 1)',
                        borderWidth: 1.5,
                        pointBackgroundColor: 'rgba(59,130,246,1)',
                        pointRadius: 3
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { r: { angleLines: { display: false }, suggestedMin: 0, suggestedMax: 100, ticks: { stepSize: 25 } } }
                }
            });
        }
        
        function setRecommendations(cefr) {
            const recs = {
                'A1': '打好基础是关键。建议每天背诵5-10个高频词汇，学习一般现在时和现在进行时的基本用法。推荐使用多邻国等入门App，观看带中文字幕的英语儿童节目。坚持3个月，你会看到明显进步。',
                'A2': '你已经掌握了基础，现在需要拓展。重点练习一般过去时和比较级，尝试用英语写简单的日记。看一些语速较慢的英文Vlog，最初可以开字幕，慢慢尝试关掉。每天读一篇短小的英文新闻。',
                'B1': '中级水平是你突破的关键阶段。系统学习条件句和情态动词，开始阅读英文短篇小说或新闻简讯。尝试用英语总结你读到的内容。听力方面，可以听英文播客，推荐BBC 6 Minute English。多说多写。',
                'B2': '你的语法基础已经很扎实，现在要提升表达的丰富度和准确性。重点：虚拟语气、被动语态、强调句型。阅读《经济学人》或《卫报》的专栏文章。看英文电影关掉字幕。开始用英语进行辩论和讨论。',
                'C1': '高水平阶段，需要打磨细节。关注习惯用语、同义词辨析、语域使用（正式vs口语）。广泛阅读不同领域的学术文章和文学作品。听TED演讲和学术讲座。用英语写议论文或专业文章。',
                'C2': '接近母语水平，保持是关键。阅读经典文学和学术期刊，关注语言的微妙差异。参与高阶辩论和学术讨论，打磨写作风格。挑战自己阅读不同时期、不同风格的英文作品，保持语言的敏感度和广度。'
            };
            recommendations.innerText = recs[cefr] || recs['B1'];
        }

        fetchReport();

        const downloadBtn = document.getElementById('download-btn');
        const brandNote = document.getElementById('brand-note');
        
        downloadBtn.addEventListener('click', async () => {
            const card = document.querySelector('.bg-white, .dark\:bg-zinc-800');
            brandNote.innerText = '生成中...';
            try {
                const canvas = await html2canvas(card, {
                    backgroundColor: card.classList.contains('dark:bg-zinc-800') ? '#27272a' : '#ffffff',
                    scale: 2,
                    useCORS: true
                });
                const link = document.createElement('a');
                link.download = 'quicklevel-score.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.92);
                link.click();
                brandNote.innerText = '成绩来自 rkrk.io/quicklevel';
            } catch(e) {
                brandNote.innerText = '生成失败，请重试';
            }
        });
    </script>
</body>
</html>
