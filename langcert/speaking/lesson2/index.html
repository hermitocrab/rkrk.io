0:`<div class="fade-in"><h1 class="section-title">Welcome to <span class="highlight">Campus Life</span>. <span class="zh-inline">欢迎来到校园生活。</span></h1>
<p class="section-subtitle">LangCert Part 2 throws you into real situations. Can you handle them politely — in English? <span class="zh-inline">第二部分把你扔进真实场景。你能用英语礼貌应对吗？</span></p>

<div class="scene-card active"><div class="scene-icon">🎬</div><h3>📹 Full B2 Speaking Test 完整B2口语考试</h3><p>See Part 2 in action. The examiner describes a scenario — you respond in character, <span class="dm">not</span> as yourself. <span class="zh-inline">看Part 2如何运作——考官描述场景，你以角色身份回应，不是你本人。</span></p>

<p style="font-size:11px;color:var(--text-dim);margin-top:4px">Part 2 (role play) starts around 3:30 <span class="zh-inline">Part 2大约在3分30秒开始</span></p></div>

<div class="scene-card"><div class="scene-icon">🎭</div><h3>Part 2: Situational Role Play 情景角色扮演</h3>
<p><strong>Duration 时长 (B2):</strong> 2–3 min | <strong>(C1):</strong> 3–4 min</p>
<p><strong>Format 形式:</strong> Examiner reads a short scenario. You interact with them in character. They play the other person (librarian, housing officer, etc). <span class="zh-inline">考官朗读场景描述，你以角色身份互动。考官扮演对方（图书管理员、住宿处老师等）。</span></p>
<p style="margin-top:12px;color:var(--pink);font-weight:600">🇨🇳 中国学生最大陷阱：太直接。"给我换个房间。" 在英语里，直接 = 攻击性。你必须用礼貌层包裹请求。<strong>缓冲（Buffer）+ 软化（Hedging）= Part 2的基础。</strong></p></div>

1:`<div class="fade-in"><h2 class="section-title">The <span class="highlight-amber">Buffer Formula</span> <span class="zh-inline">缓冲公式</span></h2>
<p class="section-subtitle"><span class="dm">Before</span> you say anything negative — buffer first. This is the single most important Part 2 skill.<span class="zh-inline">说任何负面内容之前——先缓冲。Part 2最重要的技巧，没有之一。</span></p>
<div class="dm-legend">💡 <strong>Legend 图例：</strong> <span class="dm-ex">underlined cyan</span> = <strong>discourse marker 语篇标记</strong> — words that structure your speech and make you sound polite and natural.</div>
<div class="formula-box" style="border-color:rgba(255,182,39,0.3);margin-top:16px"><div class="formula-title" style="color:var(--amber)">🛡️ 3-Step Polite Complaint 三步礼貌表达</div><div class="zh-block"><strong>核心思路：</strong>永远不要一上来就说问题。三步走：先用一句温暖的缓冲开场（让人感觉你是来合作而不是来吵架的），然后清晰地陈述问题（就事论事），最后主动提出你希望的解决方案（展现主动性——这是Task Fulfillment的评分点）。</div>
<div class="formula-steps"><span class="formula-step" style="background:rgba(255,182,39,0.15)">1. Buffer 缓冲<span class="zh-inline"> 温暖开场</span></span><span class="formula-arrow">→</span><span class="formula-step" style="background:rgba(255,182,39,0.15)">2. Issue 问题<span class="zh-inline"> 清晰陈述</span></span><span class="formula-arrow">→</span><span class="formula-step" style="background:rgba(0,212,255,0.15);color:var(--cyan)">3. Solution 方案<span class="zh-inline"> 提出解决</span></span></div></div>
<div style="background:var(--glass);border:1px solid rgba(57,255,20,0.15);border-radius:var(--radius);padding:20px;margin:16px 0"><p style="color:var(--green);font-weight:600;margin-bottom:8px">✅ POLITE Version 礼貌版 — Library Complaint 图书馆投诉</p><p style="font-size:14px;line-height:1.7;color:var(--text-dim)"><span style="color:var(--amber)">Buffer:</span> "<span class="dm">Hi there</span>, sorry to bother you."<br><span style="color:var(--amber)">Issue:</span> "<span class="dm">It's just that</span> I'm finding it <span class="dm">a bit</span> hard to concentrate with the noise."<br><span style="color:var(--cyan)">Solution:</span> "I was wondering<span class="zh-b2" title="B2表达：礼貌请求句式 I was wondering if...">📖</span> if you might know of a quieter area?"</p></div>
<div style="background:rgba(255,45,149,0.04);border:1px solid rgba(255,45,149,0.15);border-radius:var(--radius);padding:20px;margin:16px 0"><p style="color:var(--pink);font-weight:600;margin-bottom:8px">❌ DIRECT Version 直接版 — What NOT to say 别说这个</p><p style="font-size:14px;line-height:1.7;color:var(--text-dim)">"It's too noisy here. Can you be quiet?"<br><span style="color:var(--pink)">No buffer = sounds aggressive. No solution offered. This will seriously hurt your score. 没有缓冲=攻击性。没有方案。严重扣分。</span></p></div>
<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0"><div class="tip-card-header"><div class="tip-card-icon">📋</div><h4>Buffer Phrase Bank 缓冲句库 <span class="zh-inline">挑3个背熟</span></h4><span class="tip-card-tag">背3个</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><strong>Openers 开场 (B1 friendly):</strong><br>• <span class="dm">Hi there</span>, sorry to bother you...<br>• <span class="dm">Excuse me</span>, I was hoping you could help...<br>• <span class="dm">Hello</span>, I've got a quick question...<br><br><strong>Closings 收尾 (提出方案):</strong><br>• Would it be <span class="dm">possible</span> to...?<br>• Is there <span class="dm">any chance</span> that...?<br>• I'd <span class="dm">really</span> appreciate it if...<br><br><span class="zh-block"><strong>B1同学练习建议：</strong>先从最简单的开始——"Hi there, sorry to bother you" + "Is there any chance that...?"。这两句加起来只需要10个单词，但能让你听起来礼貌10倍。先把这两句练到不用想就能说出来。</span></div></div></div>
</div>`,

2:`<div class="fade-in"><h2 class="section-title">The <span class="highlight">Hedging Lab</span> <span class="zh-inline">软化实验室</span></h2>
<p class="section-subtitle">Hedging = adding small words that make you sound polite instead of rude. This is THE difference between B1 and C1.<span class="zh-inline">软化 = 添加小词让语气从生硬变礼貌。这就是B1和C1的核心区别。</span></p>
<div class="formula-box" style="border-color:rgba(0,212,255,0.3)"><div class="formula-title" style="color:var(--cyan)">🧪 Direct → Hedged <span class="zh-inline">直接→软化</span> — Tap to mark as studied <span class="zh-inline">点击标记已学</span></div></div>
<div class="hedge-card" onclick="this.classList.toggle('studied')"><span class="direct">"I want to change rooms."</span><span class="arrow-icon">→</span><span class="hedged">"I <span class="dm">was wondering</span> if I could <span class="dm">possibly</span> change rooms."</span><span class="cat">soft words</span><span class="studied-badge">✓ 已学</span></div>
<div class="hedge-card" onclick="this.classList.toggle('studied')"><span class="direct">"This is wrong."</span><span class="arrow-icon">→</span><span class="hedged">"I'm <span class="dm">not entirely sure</span> this is right — could you <span class="dm">maybe</span> check?"</span><span class="cat">being unsure</span><span class="studied-badge">✓ 已学</span></div>
<div class="hedge-card" onclick="this.classList.toggle('studied')"><span class="direct">"I need this now."</span><span class="arrow-icon">→</span><span class="hedged">"I'd <span class="dm">really appreciate</span> it if this could be sorted <span class="dm">quite</span> soon."</span><span class="cat">appreciation</span><span class="studied-badge">✓ 已学</span></div>
<div class="hedge-card" onclick="this.classList.toggle('studied')"><span class="direct">"You didn't tell me."</span><span class="arrow-icon">→</span><span class="hedged">"I <span class="dm">don't think</span> I was told — <span class="dm">maybe</span> I missed it?"</span><span class="cat">blame yourself</span><span class="studied-badge">✓ 已学</span></div>
<div class="hedge-card" onclick="this.classList.toggle('studied')"><span class="direct">"That's too expensive."</span><span class="arrow-icon">→</span><span class="hedged">"That's <span class="dm">a little bit</span> more than I expected — are there <span class="dm">maybe</span> other options?"</span><span class="cat">downtoner</span><span class="studied-badge">✓ 已学</span></div>
<p style="font-size:11px;color:var(--text-dim);margin-top:8px">Tap each card to mark as studied ✓. Tap again to unmark. <span class="zh-inline">点击标记已学，再点取消标记。</span></p>
<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0" style="margin-top:16px"><div class="tip-card-header"><div class="tip-card-icon">🧰</div><h4>6 Hedging Techniques 六大软化技巧 <span class="zh-inline">B1同学先练前3个</span></h4><span class="tip-card-tag">工具箱</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><strong>1. Soft words 软化词 (EASIEST — start here):</strong> maybe, perhaps, a little, a bit, quite, just<br><strong>2. "I" statements instead of "you" statements:</strong> "I was wondering..." not "You should..."<br><strong>3. Make it a question, not an order:</strong> "Could you...?" not "Do this."<br><br><strong>Advanced (try after mastering 1-3):</strong><br><strong>4. Modal verbs 情态动词:</strong> could, might, would<span class="zh-b2" title="B2表达：情态动词让语气更礼貌">📖</span><br><strong>5. Passive voice 被动:</strong> "It could be sorted" not "You need to sort it"<span class="zh-b2" title="B2语法：被动语态软化责备">📖</span><br><strong>6. Blame yourself 自我归因:</strong> "I might have misunderstood" not "You're wrong"<span class="zh-b2" title="B2策略：自我归因比指责对方高级得多">📖</span><br><br><strong>B1黄金法则：</strong>Part 2每句话至少用一个软化词（maybe, a bit, just）。先练这一个习惯，效果立竿见影。</div></div></div>
</div>`,

{text:'"Yeah, go talk to them. They\'re really annoying."',score:1,fb:'❌ Aggressive and rude. 攻击性+粗鲁。Score 1/5'}]}
]},

let rpState={scene:'library',step:0,score:0,choices:0,done:false};
const rpSaved={library:{score:0,choices:0},accommodation:{score:0,choices:0},registration:{score:0,choices:0},health:{score:0,choices:0}};
function saveAllProgress(){saveProgress();localStorage.setItem('langcert_l2_rp',JSON.stringify(rpSaved))}

function renderStep(n){
  currentStep=n;saveProgress();
  document.getElementById('stepContent').innerHTML=stepContent[n]||'';
  document.getElementById('stepIndicator').textContent='Step '+(n+1)+'/'+totalSteps;
  document.querySelectorAll('#stepsNav .step').forEach((el,i)=>{el.classList.remove('active','done');if(i<n)el.classList.add('done');if(i===n)el.classList.add('active')});
  document.getElementById('btnPrev').disabled=n===0;
  const nb=document.getElementById('btnNext');
  if(n===totalSteps-1){nb.textContent='Finish 🎉';nb.onclick=()=>{document.getElementById('completionModal').classList.add('show')}}
  else{nb.textContent='下一步 →';nb.onclick=()=>renderStep(n+1)}
  if(n===3)renderRoleplay();
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('btnPrev').onclick=()=>renderStep(currentStep-1);
document.getElementById('btnNext').onclick=()=>renderStep(currentStep+1);
document.querySelectorAll('#stepsNav .step').forEach(el=>{el.addEventListener('click',function(){renderStep(parseInt(this.dataset.step))})});

function switchScene(name){rpState.scene=name;rpState.step=0;rpState.done=false;rpState.score=rpSaved[name].score;rpState.choices=rpSaved[name].choices;renderRoleplay()}
function renderRoleplay(){
  const s=roleplayScenes[rpState.scene];
  document.getElementById('rpSceneTabs').innerHTML=Object.keys(roleplayScenes).map(k=>{const doneMark=rpSaved[k].choices>=2?' ✅':'';return '<button class="rp-scene-tab'+(rpState.scene===k?' active':'')+'" onclick="switchScene(\''+k+'\')">'+roleplayScenes[k].title+doneMark+'</button>'}).join('');
  const data=s.steps[rpState.step];
  document.getElementById('rpDialog').innerHTML='<div class="rp-message npc"><strong>'+data.npc+':</strong> '+data.msg+'</div>';
  document.getElementById('rpChoices').innerHTML=data.choices.map((c,i)=>'<button class="rp-choice-btn" onclick="makeChoice('+i+')">'+c.text+'</button>').join('');
  document.getElementById('rpFeedbackArea').innerHTML='';
  if(rpState.done){document.getElementById('rpChoices').innerHTML='';const avg=rpState.choices>0?Math.round(rpState.score/rpState.choices*5):0;document.getElementById('rpFeedbackArea').innerHTML='<div style="text-align:center;margin-top:16px"><div style="width:80px;height:80px;border-radius:50%;border:3px solid var(--cyan);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-family:\'Space Grotesk\',sans-serif;font-size:28px;font-weight:700;color:var(--cyan)">'+avg+'</div><p style="font-size:13px;color:var(--text-dim)">Estimated Score 预估分 /5</p></div>'}
  document.getElementById('rpScoreDisplay').textContent=rpState.choices>0?Math.round(rpState.score/rpState.choices*5):'0';
}
function makeChoice(idx){
  const s=roleplayScenes[rpState.scene];const choice=s.steps[rpState.step].choices[idx];
  document.getElementById('rpDialog').innerHTML+='<div class="rp-message user-choice">'+choice.text+'</div>';
  rpState.score+=choice.score;rpState.choices++;rpSaved[rpState.scene]={score:rpState.score,choices:rpState.choices};
  document.getElementById('rpFeedbackArea').innerHTML='<div class="rp-feedback">'+choice.fb+'</div>';
  document.getElementById('rpScoreDisplay').textContent=Math.round(rpState.score/rpState.choices*5);
  rpState.step++;if(rpState.step>=s.steps.length){rpState.done=true;saveAllProgress();setTimeout(()=>renderRoleplay(),1500)}else{setTimeout(()=>renderRoleplay(),2000)}
}
function resetRoleplay(){rpState.step=0;rpState.score=0;rpState.choices=0;rpState.done=false;rpSaved[rpState.scene]={score:0,choices:0};document.getElementById('rpScoreDisplay').textContent='0';saveAllProgress();renderRoleplay()}

const savedRP=localStorage.getItem('langcert_l2_rp');if(savedRP){try{Object.assign(rpSaved,JSON.parse(savedRP))}catch(e){}}
renderStep(currentStep);
document.addEventListener('keydown',(e)=>{if(e.key==='ArrowRight'&&currentStep<totalSteps-1&&!e.target.closest('input,textarea'))renderStep(currentStep+1);if(e.key==='ArrowLeft'&&currentStep>0&&!e.target.closest('input,textarea'))renderStep(currentStep-1)});
</script>
</body>
