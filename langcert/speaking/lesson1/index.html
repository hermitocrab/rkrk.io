0:`<div class="fade-in"><h1 class="section-title">You've landed at <span class="highlight">Heathrow</span>. <span class="zh-inline">你到希思罗了。</span></h1>
<p class="section-subtitle">LangCert Part 1 — The Interview — tests your ability to talk naturally about yourself. <span class="zh-inline">第一部分考查你用英语自然地介绍自己。</span></p>

<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0"><div class="tip-card-header"><div class="tip-card-icon">🔍</div><h4>Exam Procedure 考试流程 — Part 1</h4><span class="tip-card-tag">考场细节</span></div><div class="tip-card-body"><div class="tip-card-body-inner">
<div class="zh-block"><strong>考场设置：</strong>你和考官面对面坐在一张小桌子两边，距离约1.5米。有一个摄像头对着你（录像是为了质量监控——你不用看镜头，看着考官就行）。没有书面题目，没有笔记，没有手机。线上考试类似——视频通话，摄像头对着你，视线内不得有任何材料。</div>
<div class="procedure-grid"><div class="procedure-item"><div class="p-icon">👤→👤</div><div class="p-label">Examiner Distance 考官距离</div><div class="p-value">~1.5m apart 约1.5米</div></div><div class="procedure-item"><div class="p-icon">📹</div><div class="p-label">Camera 摄像头</div><div class="p-value">Faces you 正对你</div></div><div class="procedure-item"><div class="p-icon">📝</div><div class="p-label">Notes? 笔记？</div><div class="p-value">No — nothing 禁止</div></div><div class="procedure-item"><div class="p-icon">👀</div><div class="p-label">See Qs? 看题？</div><div class="p-value">No — spoken only 口述</div></div></div>
<p style="font-size:13px;color:var(--text-dim);line-height:1.7"><strong>流程：</strong>考官口述问题 → 你立即回答 → 下一题 → 约6-10题 → 结束。全程2-4分钟。<span class="zh-inline">线上考试类似——通过视频通话，摄像头对着你，视线内不得有任何材料。</span></p></div></div></div>

1:`<div class="fade-in"><h2 class="section-title">The <span class="highlight-cyan">30-Second Hook</span> <span class="zh-inline">30秒钩子法</span></h2>
<p class="section-subtitle">"Tell me about yourself." You get ONE chance to make an impression.<span class="zh-inline">"介绍一下你自己。" 你只有一次机会留下印象。</span></p>
<div class="formula-box"><div class="formula-title">🔥 Hook Formula 钩子公式</div><div class="zh-block">用三层结构在30秒内让人记住你：一句有吸引力的话开头 → 2-3个事实作为背景 → 加一个亮点让考官对你产生好奇。这不是背简历——是讲故事。</div>
<div class="formula-steps"><span class="formula-step">Hook 钩子 — grab attention<span class="zh-inline"> 吸引注意</span></span><span class="formula-arrow">→</span><span class="formula-step">Background 背景 — 2-3 facts<span class="zh-inline"> 2-3个事实</span></span><span class="formula-arrow">→</span><span class="formula-step">Spark 亮点 — personal twist<span class="zh-inline"> 你的独特之处</span></span></div></div>

<div class="dm-legend">💡 <strong>Legend 图例：</strong> <span class="dm-ex">underlined cyan</span> = <strong>discourse marker 语篇标记</strong> — these words connect your ideas and make you sound natural. Use them! <span class="zh-inline">这些词串联你的想法，让你听起来自然流畅。学会用它们！</span></div>

<div class="flashcard" onclick="this.classList.toggle('flipped')"><div class="flashcard-inner"><div class="flashcard-front"><div class="flashcard-label front">GOOD Answer 好答案 (B1→B2)</div><div class="flashcard-text">"I'm someone who <span class="dm">really</span> loves urban photography.<span class="zh-b2" title="B2表达：非常热爱城市摄影">📖</span> I'm from Shanghai, and I'm finishing my computer science degree. <span class="dm">What drives me</span> is combining AI with visual arts — that's my dream."</div><div class="flashcard-hint">🇬🇧 Tap to see why this works → <span class="zh-inline">点击看为什么这个答案好</span></div></div><div class="flashcard-back"><div class="flashcard-label back">Why This Works 为什么这是好答案</div><div class="flashcard-text"><strong>Hook:</strong> "I'm someone who really loves urban photography" — specific, creates curiosity<br><strong>Background:</strong> "from Shanghai, finishing CS" — clear, concise, 2 facts<br><strong>Spark:</strong> "combining AI with visual arts" — unique, memorable<br><br><span style="color:var(--green)">✓ 3 clear layers ✓ Personal ✓ ~22 seconds ✓ B1-friendly vocabulary with one B2 phrase (fully annotated)</span></div></div></div></div>

<div class="flashcard" onclick="this.classList.toggle('flipped')" style="margin-top:8px"><div class="flashcard-inner"><div class="flashcard-front"><div class="flashcard-label front" style="color:var(--pink)">WEAK Answer 差答案</div><div class="flashcard-text">"I'm Li Wei. I'm from China. I study engineering. I like football."<br><span style="font-size:12px;color:var(--text-dim)">Four short sentences. No connection. No personality.</span></div></div><div class="flashcard-back"><div class="flashcard-label back">Fixed Version 改进版</div><div class="flashcard-text">"I'm Li Wei — I'm <span class="dm">actually</span> a huge football fan, watched every Premier League game for the last 5 years! I'm from Chengdu, studying civil engineering, and <span class="dm">what I really care about</span> is designing spaces that people actually enjoy living in."</div></div></div></div>

<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0"><div class="tip-card-header"><div class="tip-card-icon">🎯</div><h4>Bridge Phrases 过渡句 — Keep the Conversation Flowing<span class="zh-inline">让对话自然延续</span></h4><span class="tip-card-tag">进阶</span></div><div class="tip-card-body"><div class="tip-card-body-inner">When you finish an answer and the examiner pauses, <strong>don't wait</strong>. Use a bridge to keep talking:<br><br>• <span class="dm">Actually</span>, that reminds me of... <span class="zh-inline">其实这让我想起...</span><br>• <span class="dm">Speaking of which</span>... <span class="zh-inline">说到这个...</span><br>• <span class="dm">Come to think of it</span>... <span class="zh-inline">仔细想想...</span><br>• <span class="dm">What I find interesting is</span>... <span class="zh-inline">我觉得有意思的是...</span><br><br><div class="zh-block"><strong>为什么这很重要：</strong>考官停顿时，你的B1同学在等下一题。你用过渡句继续说话——这就是B2/C1的区别。主动延续对话 = 最高级的流利度表现。这本身就能提0.5-1分。</div></div></div></div>
</div>`,

2:`<div class="fade-in"><h2 class="section-title">A.R.E. <span class="zh-inline">回答-理由-举例</span> — <span class="highlight">Answer → Reason → Example</span></h2>
<p class="section-subtitle">For every Part 1 question about your likes, habits, and opinions. Three layers = you'll never run out of things to say.<span class="zh-inline">每个Part 1问题都用三层回答——永远不会没话说。</span></p>
<div class="formula-box" style="border-color:rgba(255,45,149,0.3)"><div class="formula-title" style="color:var(--pink)">📐 A.R.E. Framework 回答-理由-举例框架</div><div class="zh-block"><strong>专为Part 1个人问题设计：</strong>先直接回答问题（Answer），然后解释为什么你这么觉得（Reason），最后用一个真实的小例子让人记住你（Example）。三层下来大约20-25秒——刚好是最佳时长。对于经历类问题（"Tell me about a time..."），用STAR框架——第三课会讲。</div>
<div class="formula-steps"><span class="formula-step" style="background:rgba(255,45,149,0.15)">Answer 回答<span class="zh-inline"> 直接回应问题</span></span><span class="formula-arrow">→</span><span class="formula-step" style="background:rgba(255,45,149,0.15)">Reason 理由<span class="zh-inline"> 解释为什么</span></span><span class="formula-arrow">→</span><span class="formula-step" style="background:rgba(0,212,255,0.15);color:var(--cyan)">Example 举例<span class="zh-inline"> 一个真实例子</span></span></div></div>

<div class="npc-dialog"><div class="npc-header"><div class="npc-avatar">👩‍🏫</div><div><div class="npc-name">Examiner 考官</div><div class="npc-role">Part 1</div></div></div><div class="npc-bubble">"Do you enjoy cooking?" <span class="zh-inline">"你喜欢做饭吗？"</span></div></div>

<div style="background:var(--glass);border:1px solid rgba(57,255,20,0.15);border-radius:var(--radius);padding:20px;margin:16px 0"><p style="font-size:14px;line-height:1.7"><strong style="color:var(--cyan)">✅ A.R.E. Answer (B1→B2 level)</strong><br><br><strong>Answer:</strong> "Yeah, <span class="dm">actually</span> I really enjoy it — I find it really relaxing."<br><strong>Reason:</strong> "After a long week of classes, it helps me switch off and forget about work."<br><strong>Example:</strong> "<span class="dm">Like</span>, every Sunday I cook a big meal for my flatmates. Last week I made mapo tofu<span class="zh-b2" title="B2口语加分：用具体菜名展示词汇量">📖</span> and they finished it in about ten minutes!"</p></div>

<div class="user-response" id="areResponses"><button class="response-btn" data-choice="1">"Yes, I like cooking. It's fun." <span class="zh-inline">太短! 只有A, 缺R+E</span></button><button class="response-btn" data-choice="2">"I enjoy it — helps me relax after studying. Last weekend I tried making dumplings for the first time. Total disaster but really fun!"</button><button class="response-btn" data-choice="3">"Not really. I prefer eating out." <span class="zh-inline">停了! 缺扩展</span></button></div><div id="areFeedback" style="margin-top:12px"></div>
<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0" style="margin-top:16px"><div class="tip-card-header"><div class="tip-card-icon">⏱</div><h4>Timing: How Long Should Each Answer Be? 每个回答多长？</h4><span class="tip-card-tag">关键</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><strong>Target: 15–30 seconds per answer. 目标：每个回答15-30秒。</strong><br><br>• Too short (under 10s): examiner has to ask more questions. Fluency score drops.<span class="zh-inline">太短：考官得多问，流利度扣分</span><br>• Too long (over 45s): sounds like a speech, not a conversation.<span class="zh-inline">太长：像演讲，不是对话</span><br>• Sweet spot: 2–4 sentences using A.R.E. (about 20s).<span class="zh-inline">最佳：2-4句，用A.R.E.结构</span><br><br><strong>Pacing check 节奏判断：</strong>Examiner asks 6–10 questions in Part 1. If they only ask you 4, you're talking too long. If they ask 12+, you're too short.<span class="zh-inline">考官在Part 1会问6-10题。只问到4题=你答太长了。问了12+题=你答太短了。</span></div></div></div>
</div>`,

3:`<div class="fade-in"><h2 class="section-title">P.E.E. <span class="zh-inline">观点-证据-解释</span> <span class="highlight-cyan">Extension Strategy 扩展策略</span></h2>
<p class="section-subtitle">B1 vs B2/C1 difference? Extension. P.E.E. makes sure you never stop after one sentence.<span class="zh-inline">B1和B2/C1的区别？扩展能力。P.E.E.保证你永远不会一句话就停住。</span></p>
<div class="formula-box"><div class="formula-title">📐 P.E.E. — Point → Evidence → Explanation <span class="zh-inline">观点→证据→解释</span></div><div class="zh-block"><strong>永远有话说的秘诀：</strong>陈述观点（Point）→ 给一个具体例子或事实（Evidence）→ 解释这个例子为什么重要/对你有意义（Explanation）。这三步保证了内容层层递进，不会卡壳。</div>
<div class="formula-steps"><span class="formula-step">Point 观点</span><span class="formula-arrow">→</span><span class="formula-step">Evidence 证据</span><span class="formula-arrow">→</span><span class="formula-step">Explanation 解释</span></div></div>
<div class="timer-container"><div class="timer-circle" id="peeTimer">15</div><div class="timer-label">P.E.E. Challenge: Type your answer before the timer runs out! <span class="zh-inline">15秒思考，然后写下你的P.E.E.回答。</span></div>
<div style="font-size:14px;color:var(--cyan);margin-bottom:8px">"What's your favourite way to relax?" <span class="zh-inline">"你最喜欢的放松方式？"</span></div>
<textarea class="textarea-practice" id="peeTextarea" placeholder="Type your P.E.E. answer here... (Point → Evidence → Explanation). Keep it simple — you're B1, aim for 3-4 sentences. 写3-4句话，用简单句子就好。"></textarea>
<div class="checklist" id="peeChecklist"><label class="checklist-item"><input type="checkbox" onchange="updatePEEChecklist()"> Point 观点: I answered the question <span class="zh-inline">我回答了问题</span></label><label class="checklist-item"><input type="checkbox" onchange="updatePEEChecklist()"> Evidence 证据: I gave a real example <span class="zh-inline">我给了真实例子</span></label><label class="checklist-item"><input type="checkbox" onchange="updatePEEChecklist()"> Explanation 解释: I said why it matters <span class="zh-inline">我解释了为什么重要</span></label></div>
<div class="timer-controls"><button class="btn btn-primary btn-sm" onclick="startPEETimer()">Start ⏱</button><button class="btn btn-secondary btn-sm" onclick="resetPEETimer()">Reset</button></div></div>
<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0"><div class="tip-card-header"><div class="tip-card-icon">🔑</div><h4>Extension Cheat Sheet 扩展小抄 <span class="zh-inline">当脑子空白时</span></h4><span class="tip-card-tag">背下来</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><strong>When you need an example 需要举例时：</strong><br>• <span class="dm">For instance</span>, just last week...<br>• <span class="dm">A good example is</span>...<br>• <span class="dm">Like</span>, the other day I...<br><br><strong>When you need to explain why 需要解释原因时：</strong><br>• <span class="dm">The reason I say that is</span>...<br>• <span class="dm">What I mean is</span>...<br>• <span class="dm">That's because</span>...<br><br><span class="zh-block"><strong>B1同学注意：</strong>这些是最常用的扩展标记词。<strong>先练熟前3个</strong>（For instance, A good example is, Like），能做到脱口而出再学后面的。不用一次全部记住。</span></div></div></div>
</div>`,

<p class="section-subtitle">4 real Part 1 questions. 30 seconds each. This is exactly how the exam feels.<span class="zh-inline">4道Part 1真题，每题30秒。模拟真实考试的节奏感。</span></p>

<div class="timer-controls"><button class="btn btn-primary btn-sm" id="practiceStartBtn" onclick="startPractice()">Start 🎤</button><button class="btn btn-cyan btn-sm" id="practiceNextBtn" onclick="nextPracticeQ()" disabled>Next →</button></div></div><div id="practiceFeedback" style="text-align:center;margin-top:16px"></div></div>`,

5:`<div class="fade-in"><h2 class="section-title">Lesson 1 <span class="highlight-cyan">Complete! 完成!</span></h2>
<div class="scene-card active" style="text-align:center"><div class="scene-icon">🏆</div><h3>Skills Unlocked 已解锁技能</h3>
<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:16px 0"><span class="formula-step">🪝 30s Hook 钩子</span><span class="formula-step" style="background:rgba(255,45,149,0.15)">📐 A.R.E.</span><span class="formula-step" style="background:rgba(0,212,255,0.15);color:var(--cyan)">🧪 P.E.E.</span><span class="formula-step">⏱ Timed 计时</span><span class="formula-step" style="background:rgba(57,255,20,0.12);color:var(--green)">💬 Bridge 过渡</span></div></div>

<div class="video-wrapper" style="margin:20px 0"><iframe src="https://www.youtube.com/embed/JNEg6tB2nX0" title="B2 Speaking Practice" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>
<p style="font-size:11px;color:var(--text-dim);text-align:center;margin-bottom:20px">📹 Extra 额外: Full B2 Speaking Test — see all 4 parts 完整4部分示范</p>

<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0"><div class="tip-card-header"><div class="tip-card-icon">🏛️</div><h4>Complete Part 1 Exam Procedure 完整考试流程</h4><span class="tip-card-tag">考前必读</span></div><div class="tip-card-body"><div class="tip-card-body-inner">
<p class="procedure-list"><strong>1. Enter 入场。</strong> Examiner greets you. Camera faces you, ~1.5m away. Small table between you and the examiner. <span class="zh-inline">考官问候你，摄像头正对你约1.5米远，你和考官之间有小桌子。</span></p>
<p class="procedure-list" style="margin-top:8px"><strong>2. ID check 身份核验。</strong> NOT scored — just procedure. <span class="zh-inline">不计分——只是流程。</span></p>
<p class="procedure-list" style="margin-top:8px"><strong>3. Part 1 begins 开始。</strong> "Now I'd like to ask you some questions about yourself." Questions are spoken — you will NOT see them written anywhere. No paper, no screen. <span class="zh-inline">问题口述——你看不到任何书面题目。没有纸，没有屏幕。</span></p>
<p class="procedure-list" style="margin-top:8px"><strong>4. You answer 你回答。</strong> Each question comes right after your answer. No pause. ~6–10 questions total. <span class="zh-inline">每题紧接你的回答，没有停顿。约6-10题。</span></p>
<p class="procedure-list" style="margin-top:8px"><strong>5. Transition 过渡。</strong> After 2–4 min, examiner ends Part 1 and introduces Part 2. <span class="zh-inline">2-4分钟后考官示意Part 1结束，进入Part 2。</span></p>

function renderStep(n){
  currentStep=n;saveProgress();
  document.getElementById('stepContent').innerHTML=stepContent[n]||'';
  document.getElementById('stepIndicator').textContent='Step '+(n+1)+'/'+totalSteps;
  document.querySelectorAll('#stepsNav .step').forEach((el,i)=>{el.classList.remove('active','done');if(i<n)el.classList.add('done');if(i===n)el.classList.add('active')});
  document.getElementById('btnPrev').disabled=n===0;
  const nb=document.getElementById('btnNext');
  if(n===totalSteps-1){nb.textContent='Finish 🎉';nb.onclick=()=>{document.getElementById('completionModal').classList.add('show')}}
  else{nb.textContent='下一步 →';nb.onclick=()=>renderStep(n+1)}
  if(n===2)setTimeout(setupAREHandlers,100);
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('btnPrev').onclick=()=>renderStep(currentStep-1);
document.getElementById('btnNext').onclick=()=>renderStep(currentStep+1);
document.querySelectorAll('#stepsNav .step').forEach(el=>{el.addEventListener('click',function(){renderStep(parseInt(this.dataset.step))})});

function setupAREHandlers(){
  document.querySelectorAll('#areResponses .response-btn').forEach(btn=>{btn.onclick=function(){
    document.querySelectorAll('#areResponses .response-btn').forEach(b=>b.classList.remove('selected'));
    this.classList.add('selected');const c=parseInt(this.dataset.choice),fb=document.getElementById('areFeedback');
    if(c===1)fb.innerHTML='<div style="background:rgba(255,45,149,0.08);border:1px solid rgba(255,45,149,0.2);border-radius:12px;padding:14px;font-size:13px"><span style="color:var(--pink)">⚠️ B1 level — needs extension.</span> You gave the Answer, but you\'re missing the Reason and Example. Try: <em>"I like cooking because it helps me relax after a long day. Last week I tried making noodles and it turned out great!"</em> <span class="zh-inline">你只回答了问题（Answer）但缺少理由和举例。加上这两层——很简单！</span></div>';
    else if(c===2)fb.innerHTML='<div style="background:rgba(57,255,20,0.06);border:1px solid rgba(57,255,20,0.2);border-radius:12px;padding:14px;font-size:13px"><span style="color:var(--green)">✅ Perfect A.R.E.!</span> Answer + Reason + Example — <span class="dm">natural</span>, personal, and the right length. This is how you move from B1 to B2. <span class="zh-inline">完美的ARE！回答+理由+举例——自然、个人化、长度刚好。这就是B1升B2的方式。</span></div>';
    else fb.innerHTML='<div style="background:rgba(255,45,149,0.06);border:1px solid rgba(255,45,149,0.15);border-radius:12px;padding:14px;font-size:13px"><span style="color:var(--pink)">❌ Stopped too soon.</span> You answered but didn\'t extend. <span class="dm">Even if</span> you don\'t enjoy something, you can still add a reason and example: <em>"I don\'t really cook because I\'m always too tired after class. I usually just grab something quick from the canteen — the noodles there are actually pretty good!"</em> <span class="zh-inline">即使你不喜欢某件事，也可以加理由和例子——很简单！</span></div>';
  }});
}

let peeInterval=null;
function startPEETimer(){let t=15;const el=document.getElementById('peeTimer');el.textContent=t;el.classList.add('running');if(peeInterval)clearInterval(peeInterval);peeInterval=setInterval(()=>{t--;el.textContent=t;if(t<=5)el.classList.add('warning');if(t<=0){clearInterval(peeInterval);el.classList.remove('running','warning');el.textContent='⏰';checkPEEAnswer()}},1000)}
function resetPEETimer(){if(peeInterval)clearInterval(peeInterval);const el=document.getElementById('peeTimer');el.classList.remove('running','warning');el.textContent='15';document.getElementById('peeTextarea').value=''}
function updatePEEChecklist(){document.querySelectorAll('#peeChecklist input[type=checkbox]').forEach(cb=>cb.parentElement.classList.toggle('checked',cb.checked))}
function checkPEEAnswer(){const text=document.getElementById('peeTextarea').value.trim();if(text.length<30){document.getElementById('peeTimer').textContent='📝'}else{const cbs=document.querySelectorAll('#peeChecklist input[type=checkbox]');const checked=Array.from(cbs).filter(c=>c.checked).length;document.getElementById('peeTimer').textContent=checked>=2?'✅':'📝'}}

let practiceInterval=null,practiceTime=30,practiceQ=0;
const practiceQuestions=['Q1: Where do you see yourself in five years? 五年后你在哪里？','Q2: What do you enjoy most about your studies? 你最喜欢学习的哪方面？','Q3: Describe your ideal weekend. 描述你的理想周末。','Q4: What kind of music do you like and why? 你喜欢什么音乐，为什么？'];
function startPractice(){document.getElementById('practiceStartBtn').disabled=true;document.getElementById('practiceNextBtn').disabled=false;practiceTime=30;const el=document.getElementById('practiceTimer');el.textContent=practiceTime;el.classList.add('running');document.getElementById('practiceLabel').textContent='Type your answer! 写回答!';document.getElementById('practiceFeedback').innerHTML='';if(practiceInterval)clearInterval(practiceInterval);practiceInterval=setInterval(()=>{practiceTime--;el.textContent=practiceTime;if(practiceTime<=8&&practiceTime>0)el.classList.add('warning');if(practiceTime<=0){clearInterval(practiceInterval);el.classList.remove('running','warning');el.textContent='⏰';document.getElementById('practiceLabel').textContent="Time's up! 时间到!";const text=document.getElementById('practiceTextarea').value.trim();document.getElementById('practiceFeedback').innerHTML=text.length>20?'<span style="color:var(--green);font-size:14px">✅ Good length. 长度不错。Did you give a reason AND an example? 你给了理由和例子吗？</span>':'<span style="color:var(--amber);font-size:14px">⚠️ Try writing a bit more — aim for 3 sentences with a reason and example. 试着多写一点——争取3句话，有理由有例子。</span>'}},1000)}
function nextPracticeQ(){practiceQ++;if(practiceInterval)clearInterval(practiceInterval);if(practiceQ>=practiceQuestions.length){document.getElementById('practiceQuestion').textContent='All 4 done! ✅ 全部完成！';document.getElementById('practiceQNum').textContent='';document.getElementById('practiceTimer').textContent='🏆';document.getElementById('practiceTimer').classList.remove('running','warning');document.getElementById('practiceLabel').textContent='Great! 很棒！';document.getElementById('practiceNextBtn').disabled=true;document.getElementById('practiceStartBtn').disabled=true;return}
document.getElementById('practiceQuestion').textContent=practiceQuestions[practiceQ];document.getElementById('practiceQNum').textContent='Question '+(practiceQ+1)+' of 4';document.getElementById('practiceTimer').textContent='30';document.getElementById('practiceTimer').classList.remove('running','warning');document.getElementById('practiceLabel').textContent='Ready? 准备好了？';document.getElementById('practiceStartBtn').disabled=false;document.getElementById('practiceFeedback').innerHTML='';document.getElementById('practiceTextarea').value='';practiceTime=30}

renderStep(currentStep);
document.addEventListener('keydown',(e)=>{if(e.key==='ArrowRight'&&currentStep<totalSteps-1&&!e.target.closest('input,textarea'))renderStep(currentStep+1);if(e.key==='ArrowLeft'&&currentStep>0&&!e.target.closest('input,textarea'))renderStep(currentStep-1)});
</script>
