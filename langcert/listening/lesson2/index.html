1:`<div class="fade-in"><h2 class="section-title">Part 2 <span class="highlight-green">Format & Strategy</span> <span class="zh-inline">题型与策略</span></h2>
<p class="section-subtitle">Understanding how Part 2 questions are structured before you listen. <span class="zh-inline">先理解题型结构再听。</span></p>
<div class="formula-box"><div class="formula-title">💬 Part 2 — Two Main Question Categories 两大题型</div><div class="formula-steps"><span class="formula-step" style="background:rgba(179,71,234,0.12)">Category 1: Gist & Attitude 主旨态度</span><span class="formula-arrow" style="color:var(--green)">•</span><span class="formula-step" style="background:rgba(57,255,20,0.1);color:var(--text)">Category 2: Detail & Inference 细节推断</span></div></div>
<div class="timing-card"><div class="t-icon">⏱</div><div class="t-detail"><div class="t-label">Part 2 Timing</div><div class="t-value">~45-90s per conversation</div><div class="t-note">Conversation plays once → 10s to read questions → answer 2-3 questions → next conversation. <span class="zh-inline">对话放一遍 → 10秒看题 → 回答2-3题 → 下一段。</span></div></div></div>
<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0"><div class="tip-card-header"><div class="tip-card-icon">🎯</div><h4>The First-Second-Listen Strategy 首遍定位策略</h4><span class="tip-card-tag">核心技巧</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><strong>Since you hear it once, you need a system:</strong><br><br><strong>First 10 seconds:</strong> Identify the <span class="sp">relationship</span> (friends? student-teacher? customer-staff?) and the <span class="att">general mood</span> (friendly? tense? formal?).<br><strong>Middle:</strong> Track the main <span class="dm">turning point</span> — where does the conversation shift? Look for: "but", "actually", "the thing is", "to be honest".<br><strong>Last 10 seconds:</strong> Outcome — what was decided? What's the <span class="att">final feeling</span>?<br><br><span class="zh-block"><strong>B1版本：</strong>前10秒判断关系+情绪 → 中间追踪转折点 → 最后10秒抓结果。这个方法只需要听懂30%的单词就能定位关键信息。</span></div></div></div>
</div>`,

2:`<div class="fade-in"><h2 class="section-title"><span class="highlight">Discourse Markers</span> in Dialogue <span class="zh-inline">对话中的语篇标记</span></h2>
<p class="section-subtitle">In conversations, <span class="dm">discourse markers</span> tell you where the conversation is going — agreement, disagreement, hesitation, topic change. <span class="zh-inline">对话中的语篇标记告诉你对话走向——同意、反对、犹豫、话题转换。</span></p>

<div class="audio-player"><div class="audio-controls"><button class="audio-btn play-btn" onclick="if(!isPlaying)speakText('Speaker A: So what did you think of the presentation? Speaker B: Well, to be honest, I thought it was a bit too long. But the data part was really strong.',1)">▶</button><div class="audio-progress"><div class="audio-progress-fill"></div></div><span class="audio-time">~14s</span><button class="audio-speed" onclick="setSpeed(0.75,this)">0.75x</button><button class="audio-speed active" onclick="setSpeed(1,this)">1x</button><button class="script-toggle" onclick="toggleScript('s1')">📝 Script</button></div><div class="script-panel" id="s1"><span class="sp">Speaker A (colleague):</span> "So what did you think of the presentation?"<br><span class="sp">Speaker B (colleague):</span> "<span class="dm">Well</span>, <span class="dm">to be honest</span>, I thought it was <span class="dm">a bit</span> too long. <span class="dm">But</span> the data part was really strong."<br><span class="zh-block"><strong>标记分析：</strong>"Well" + "to be honest" = 准备说批评了。"a bit" = 软化批评。"But" = 转折→也有好的部分。"really strong" = 积极评价。结论：<strong>总体积极但有保留</strong>。</span></div></div>

<div class="q-stem">What is Speaker B's overall opinion of the presentation?</div><div class="q-options" id="q6"><div class="q-option" onclick="checkAnswer('q6',0,2)">A) It was very poor and a waste of time</div><div class="q-option" onclick="checkAnswer('q6',1,2)">B) It was perfect in every way</div><div class="q-option" onclick="checkAnswer('q6',2,2)">C) It was mostly good but a bit too long</div></div><div class="q-feedback" id="q6-fb"></div>

<div class="audio-player" style="margin-top:20px"><div class="audio-controls"><button class="audio-btn play-btn" onclick="if(!isPlaying)speakText('Speaker A: Are you free to help me move the equipment tomorrow? Speaker B: I would love to, but the thing is, I have got a deadline at 3pm. Actually, what about Friday instead?',1)">▶</button><div class="audio-progress"><div class="audio-progress-fill"></div></div><span class="audio-time">~16s</span><button class="audio-speed" onclick="setSpeed(0.75,this)">0.75x</button><button class="audio-speed active" onclick="setSpeed(1,this)">1x</button><button class="script-toggle" onclick="toggleScript('s2')">📝 Script</button></div><div class="script-panel" id="s2"><span class="sp">Speaker A (friend):</span> "Are you free to help me move the equipment tomorrow?"<br><span class="sp">Speaker B (friend):</span> "I <span class="dm">would love to</span>, <span class="dm">but the thing is</span>, I've got a deadline at 3pm. <span class="dm">Actually</span>, what about Friday <span class="dm">instead</span>?"<br><span class="zh-block"><strong>标记分析：</strong>"I would love to" = 愿意但→ "but" + "the thing is" = 有障碍。"Actually" = 转折→提出替代方案。"instead" = 改写→不是明天，是周五。结论：<strong>愿意帮忙但明天不行，提议周五</strong>。</span></div></div>

<div class="q-stem">What does Speaker B suggest?</div><div class="q-options" id="q7"><div class="q-option" onclick="checkAnswer('q7',0,1)">A) Helping tomorrow after 3pm</div><div class="q-option" onclick="checkAnswer('q7',1,1)">B) Helping on Friday instead of tomorrow</div><div class="q-option" onclick="checkAnswer('q7',2,1)">C) Asking someone else to help</div></div><div class="q-feedback" id="q7-fb"></div>

<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0" style="margin-top:20px"><div class="tip-card-header"><div class="tip-card-icon">💬</div><h4>Conversation Signal Words 对话信号词</h4><span class="tip-card-tag">必背</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><strong>Agreement 同意:</strong> <span class="dm">absolutely</span>, <span class="dm">exactly</span>, <span class="dm">I couldn't agree more</span>, <span class="dm">for sure</span><br><strong>Polite disagreement 委婉反对:</strong> <span class="dm">I see what you mean, but</span>..., <span class="dm">that's a fair point, however</span>..., <span class="dm">I'm not totally convinced</span><br><strong>Topic change 话题转换:</strong> <span class="dm">speaking of which</span>, <span class="dm">by the way</span>, <span class="dm">that reminds me</span>, <span class="dm">anyway</span><br><strong>Hesitation 犹豫:</strong> <span class="dm">well</span>..., <span class="dm">um</span>..., <span class="dm">the thing is</span>..., <span class="dm">how can I put this</span>...<br><strong>Conclusion 总结:</strong> <span class="dm">so basically</span>, <span class="dm">at the end of the day</span>, <span class="dm">to sum up</span><br><span class="zh-block"><strong>B1技巧：</strong>不要试图听懂每个词。追着信号词走——听到"but"立刻警觉（后面是重点），听到"actually"注意转折，听到"absolutely"确认同意。信号词是对话路标。</span></div></div></div>
</div>`,

3:`<div class="fade-in"><h2 class="section-title"><span class="highlight-green">Speaker Attitude</span> & Relationship <span class="zh-inline">态度与关系</span></h2>
<p class="section-subtitle">The exam <span class="dm">always</span> asks about how speakers feel — and it's <span class="dm">never</span> said directly. <span class="zh-inline">考试一定会问说话人什么态度——而且永远不会直接说。</span></p>

<div class="audio-player"><div class="audio-controls"><button class="audio-btn play-btn" onclick="if(!isPlaying)speakText('A: Hi, I was told to come to this office to pick up my student card? B: Right, let me just check — Li Wei, is it? A: Yes, that is me. B: Here you go. And do not forget, you need to renew it every semester. A: Oh, I did not know that. Thanks for telling me. B: No problem.',1)">▶</button><div class="audio-progress"><div class="audio-progress-fill"></div></div><span class="audio-time">~22s</span><button class="audio-speed" onclick="setSpeed(0.75,this)">0.75x</button><button class="audio-speed active" onclick="setSpeed(1,this)">1x</button><button class="script-toggle" onclick="toggleScript('s3')">📝 Script</button></div><div class="script-panel" id="s3"><span class="sp">A (student):</span> "Hi, I was told to come to this office to pick up my student card?"<br><span class="sp">B (staff):</span> "<span class="dm">Right</span>, let me just check — Li Wei, <span class="dm">is it</span>?"<br><span class="sp">A:</span> "Yes, that's me."<br><span class="sp">B:</span> "Here you go. <span class="dm">And</span> don't forget, you need to renew it every semester."<br><span class="sp">A:</span> "<span class="att">Oh</span>, I didn't know that. <span class="att">Thanks</span> for telling me."<br><span class="sp">B:</span> "No problem."<br><span class="zh-block"><strong>态度+关系分析：</strong>关系 = <span class="sp">student-staff</span>（staff checks name, uses instructional tone）。态度 = <span class="att">helpful and polite</span>（B is efficient but friendly, A is slightly surprised then grateful）。关键标记："Right"=确认听到，"is it?"=核查，"don't forget"=提醒（不是批评），"Oh"=意外，"Thanks"=感激。</span></div></div>

<div class="q-stem">What is the relationship between the speakers?</div><div class="q-options" id="q8"><div class="q-option" onclick="checkAnswer('q8',0,0)">A) University staff and a student</div><div class="q-option" onclick="checkAnswer('q8',1,0)">B) Two students who are friends</div><div class="q-option" onclick="checkAnswer('q8',2,0)">C) A teacher and a parent</div></div><div class="q-feedback" id="q8-fb"></div>

<div class="q-stem" style="margin-top:16px">How does Speaker A feel at the end?</div><div class="q-options" id="q9"><div class="q-option" onclick="checkAnswer('q9',0,1)">A) Annoyed about the renewal rule</div><div class="q-option" onclick="checkAnswer('q9',1,1)">B) Surprised and grateful for the information</div><div class="q-option" onclick="checkAnswer('q9',2,1)">C) Confused about where to go</div></div><div class="q-feedback" id="q9-fb"></div>
</div>`,

4:`<div class="fade-in"><h2 class="section-title"><span class="highlight">Detail Extraction</span> <span class="zh-inline">细节提取</span></h2>
<p class="section-subtitle">Part 2 will ask for <span class="pr">specific details</span> — but they will be paraphrased in the options. <span class="zh-inline">Part 2会考具体细节——但选项会改写。</span></p>

<div class="audio-player"><div class="audio-controls"><button class="audio-btn play-btn" onclick="if(!isPlaying)speakText('A: Have you decided which modules to take next term? B: Not completely. I am definitely doing the data analysis one with Professor Chen. And probably the marketing module. But I might drop creative writing. A: Oh really? I thought you loved that. B: I do, it is just that the timetable clashes with my part-time job. So I will have to choose.',1)">▶</button><div class="audio-progress"><div class="audio-progress-fill"></div></div><span class="audio-time">~28s</span><button class="audio-speed" onclick="setSpeed(0.75,this)">0.75x</button><button class="audio-speed active" onclick="setSpeed(1,this)">1x</button><button class="script-toggle" onclick="toggleScript('s4')">📝 Script</button></div><div class="script-panel" id="s4"><span class="sp">A:</span> "Have you decided which modules to take next term?"<br><span class="sp">B:</span> "<span class="dm">Not completely</span>. I'm <span class="dm">definitely</span> doing the data analysis one with Professor Chen. <span class="dm">And probably</span> the marketing module. <span class="dm">But</span> I <span class="pr">might drop</span> creative writing."<br><span class="sp">A:</span> "<span class="att">Oh really?</span> I thought you loved that."<br><span class="sp">B:</span> "I <span class="dm">do</span>, <span class="dm">it's just that</span> the <span class="pr">timetable clashes</span> with my part-time job. <span class="dm">So</span> I'll have to choose."<br><span class="zh-block"><strong>细节提取：</strong>确定选的：data analysis（陈教授）+ marketing。可能要退的：creative writing。原因：<span class="pr">时间冲突</span>（timetable clashes = <strong>两门课时间重叠</strong>，选项可能写成"two classes are at the same time"）。</span></div></div>

<div class="q-stem">Why might Speaker B drop creative writing?</div><div class="q-options" id="q10"><div class="q-option" onclick="checkAnswer('q10',0,0)">A) It clashes with another class or commitment</div><div class="q-option" onclick="checkAnswer('q10',1,0)">B) Speaker B no longer enjoys the subject</div><div class="q-option" onclick="checkAnswer('q10',2,0)">C) Professor Chen recommended against it</div></div><div class="q-feedback" id="q10-fb"></div>

<div class="q-stem" style="margin-top:16px">Which modules is Speaker B certain about taking?</div><div class="q-options" id="q11"><div class="q-option" onclick="checkAnswer('q11',0,1)">A) Marketing and creative writing</div><div class="q-option" onclick="checkAnswer('q11',1,1)">B) Data analysis and probably marketing</div><div class="q-option" onclick="checkAnswer('q11',2,1)">C) Only data analysis</div></div><div class="q-feedback" id="q11-fb"></div>

<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0" style="margin-top:20px"><div class="tip-card-header"><div class="tip-card-icon">🔍</div><h4>Detail Questions: The Paraphrase Trap 细节题的改写陷阱</h4><span class="tip-card-tag">避坑</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><strong>Common paraphrase patterns in Part 2 details:</strong><br><br>Audio says: <span class="pr">"might drop"</span> → Option says: <span class="pr">"is considering removing"</span><br>Audio says: <span class="pr">"timetable clashes"</span> → Option says: <span class="pr">"two classes at the same time"</span><br>Audio says: <span class="pr">"not completely"</span> → Option says: <span class="pr">"hasn't decided everything yet"</span><br>Audio says: <span class="pr">"probably"</span> → Option says: <span class="pr">"is likely to"</span><br><br><span class="zh-block"><strong>B1技巧：</strong>听到"不确定"的表达（might, probably, not sure, not completely, thinking about）→ 答案不会是绝对的（definitely, certainly, for sure）。Part 2永远选最<strong>模糊</strong>的那个。</span></div></div></div>
</div>`,

5:`<div class="fade-in"><h2 class="section-title">L2 <span class="highlight">Complete! 完成!</span></h2>
<div class="scene-card active" style="text-align:center"><div class="scene-icon">🎧</div><h3>Skills Unlocked 已解锁技能</h3><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:16px 0"><span class="formula-step" style="background:rgba(0,212,255,0.1)">💬 Discourse Markers 标记</span><span class="formula-step" style="background:rgba(179,71,234,0.12)">😊 Attitude 态度</span><span class="formula-step" style="background:rgba(57,255,20,0.1);color:var(--text)">👥 Relationship 关系</span><span class="formula-step" style="background:rgba(255,182,39,0.1)">🔍 Detail 细节</span></div></div>

<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0"><div class="tip-card-header"><div class="tip-card-icon">🏛️</div><h4>Part 2 Exam Day: What Happens 考场实操</h4><span class="tip-card-tag">考前必读</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><p class="procedure-list"><strong>1.</strong> After Part 1 ends, a <span class="pr">short pause</span> (~5 seconds). Then Part 2 begins automatically. <span class="zh-inline">Part 1结束后短暂停顿(~5秒)，Part 2自动开始。</span></p><p class="procedure-list" style="margin-top:8px"><strong>2.</strong> First conversation plays <span class="pr">once</span>. You then see 2-3 questions with 3 options each. <span class="zh-inline">第一段对话放一遍。然后看到2-3题，每题3个选项。</span></p><p class="procedure-list" style="margin-top:8px"><strong>3.</strong> You have ~20 seconds to answer all questions for that conversation before the next one starts. <span class="zh-inline">约20秒回答该段对话的所有问题，然后下一段开始。</span></p><p class="procedure-list" style="margin-top:8px"><strong>4.</strong> 2-3 conversations total. Then Part 3 begins. <span class="zh-inline">共2-3段对话。然后进入Part 3。</span></p><p style="margin-top:12px;font-size:12px;color:var(--amber)"><strong>💡 关键策略：</strong>听对话时不要看选项——先纯听。对话结束后再看题。你已经用"首-中-尾定位法"记住了关键信息——答题时只需要匹配改写。</p></div></div></div>

<div style="margin:20px 0"><div class="rubric-mini"><h5>📋 Final Self-Check</h5><div class="checklist"><label class="checklist-item"><input type="checkbox"> I can track discourse markers (but, actually, well, to be honest) in conversations</label><label class="checklist-item"><input type="checkbox"> I can identify speaker attitude from tone and word choice</label><label class="checklist-item"><input type="checkbox"> I can recognise speaker relationships (friends, staff-student, etc.)</label><label class="checklist-item"><input type="checkbox"> I can extract specific details despite paraphrase in options</label><label class="checklist-item"><input type="checkbox"> I use First-Middle-Last strategy: relationship → turning point → outcome</label></div></div></div>
<p style="text-align:center;color:var(--text-dim);font-size:14px;margin-top:20px">L3: Longer Talks — academic monologues, note-taking strategies, and main idea vs supporting detail. <span class="zh-inline">L3：长段独白——学术独白、笔记策略和主旨vs细节。</span></p></div>`
};

function renderStep(n){
  currentStep=n;saveProgress();stopAudio();
  document.getElementById('stepContent').innerHTML=stepContent[n]||'';
  document.getElementById('stepIndicator').textContent='Step '+(n+1)+'/'+totalSteps;
  document.querySelectorAll('#stepsNav .step').forEach((el,i)=>{el.classList.remove('active','done');if(i<n)el.classList.add('done');if(i===n)el.classList.add('active')});
  document.getElementById('btnPrev').disabled=n===0;
  if(n===totalSteps-1){document.getElementById('btnNext').textContent='Finish 🎉';document.getElementById('btnNext').onclick=()=>{document.getElementById('completionModal').classList.add('show')}}
  else{document.getElementById('btnNext').textContent='下一步 →';document.getElementById('btnNext').onclick=()=>renderStep(n+1)}
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('btnPrev').onclick=()=>renderStep(currentStep-1);
document.getElementById('btnNext').onclick=()=>renderStep(currentStep+1);
document.querySelectorAll('#stepsNav .step').forEach(el=>{el.addEventListener('click',function(){renderStep(parseInt(this.dataset.step))})});
document.addEventListener('keydown',(e)=>{if(e.key==='ArrowRight'&&currentStep<totalSteps-1&&!e.target.closest('input,textarea'))renderStep(currentStep+1);if(e.key==='ArrowLeft'&&currentStep>0&&!e.target.closest('input,textarea'))renderStep(currentStep-1)});
renderStep(currentStep);
</script>
</body>
</html>
