// ── Simple TTS audio player ──
let currentUtterance=null,isPlaying=false,audioInterval=null,audioStartTime=0,audioDuration=0;
function speakText(text,rate){stopAudio();const u=new SpeechSynthesisUtterance(text);u.rate=rate||1;u.lang='en-GB';audioDuration=text.split(' ').length*0.35/ (rate||1);currentUtterance=u;isPlaying=true;audioStartTime=Date.now();updatePlayBtn(true);speechSynthesis.speak(u);audioInterval=setInterval(updateAudioProgress,100);u.onend=()=>{stopAudio()}}
function stopAudio(){if(currentUtterance){speechSynthesis.cancel();currentUtterance=null}isPlaying=false;if(audioInterval)clearInterval(audioInterval);updatePlayBtn(false);updateProgressBar(0)}
function updatePlayBtn(playing){document.querySelectorAll('.audio-btn.play-btn').forEach(b=>{b.textContent=playing?'⏸':'▶';b.classList.toggle('playing',playing)})}
function updateAudioProgress(){if(!isPlaying)return;const elapsed=(Date.now()-audioStartTime)/1000;const pct=Math.min(100,Math.round(elapsed/audioDuration*100));updateProgressBar(pct)}
function updateProgressBar(pct){document.querySelectorAll('.audio-progress-fill').forEach(b=>b.style.width=pct+'%')}
function setSpeed(rate,btnEl){document.querySelectorAll('.audio-speed').forEach(b=>b.classList.remove('active'));btnEl.classList.add('active');if(isPlaying&&currentUtterance){const txt=currentUtterance.text;stopAudio();speakText(txt,rate)}}

// ── Script toggle ──

// ── Q check ──

1:`<div class="fade-in"><h2 class="section-title">Part 1 <span class="highlight-purple">Format Breakdown</span> <span class="zh-inline">题型拆解</span></h2>
<p class="section-subtitle">Understanding the question types before you practice. <span class="zh-inline">先理解题型再练习。</span></p>
<div class="formula-box"><div class="formula-title">📋 Part 1 — Three Question Types 三种题型</div><div class="formula-steps"><span class="formula-step" style="background:rgba(57,255,20,0.12)">Type 1: Best Reply 最佳回应</span><span class="formula-arrow" style="color:var(--green)">•</span><span class="formula-step" style="background:rgba(179,71,234,0.12)">Type 2: True Statement 正确陈述</span><span class="formula-arrow" style="color:var(--green)">•</span><span class="formula-step" style="background:rgba(0,212,255,0.1);color:var(--cyan)">Type 3: Speaker Intention 说话意图</span></div></div>
<div class="timing-card"><div class="t-icon">⏱</div><div class="t-detail"><div class="t-label">Real Exam Timing 真实考试时间</div><div class="t-value">~40 seconds per question 每题</div><div class="t-note">You hear the statement (~10-15s) → 5s pause to read options → choose answer → next question. <span class="zh-inline">听到陈述(~10-15秒) → 5秒看选项 → 选答案 → 下一题。</span></div></div></div>
<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0"><div class="tip-card-header"><div class="tip-card-icon">💡</div><h4>Type 1: Best Reply — Example 最佳回应范例</h4><span class="tip-card-tag">最常考</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><strong>You hear:</strong> "I'm <span class="dm">really</span> sorry but the meeting has been pushed back to 3pm."<br><br><strong>Options:</strong><br>A) "No problem, thanks for letting me know." ✓<br>B) "I don't think the meeting will be very long."<br>C) "The meeting room is on the third floor."<br><br><strong>Key:</strong> The speaker is <span class="pr">apologising and informing</span>. The best reply acknowledges the information politely. Options B and C miss the point entirely. <span class="zh-inline">说话人在道歉并告知时间变更。A承认并感谢——B和C完全偏离。</span></div></div></div>
</div>`,

2:`<div class="fade-in"><h2 class="section-title"><span class="highlight">Key Word Spotting</span> <span class="zh-inline">关键词捕捉</span></h2>
<p class="section-subtitle">You don't need every word — just the <span class="dm">signal words</span> that tell you what's happening. <span class="zh-inline">不需要每个词——只要抓住告诉你发生了什么的<strong>信号词</strong>。</span></p>

<div class="audio-player"><div class="audio-controls"><button class="audio-btn play-btn" onclick="if(!isPlaying)speakText('I was wondering if you could possibly help me move these boxes to the storage room?',1)">▶</button><div class="audio-progress"><div class="audio-progress-fill"></div></div><span class="audio-time">~8s</span><button class="audio-speed" onclick="setSpeed(0.75,this)">0.75x</button><button class="audio-speed active" onclick="setSpeed(1,this)">1x</button><button class="audio-speed" onclick="setSpeed(1.25,this)">1.25x</button><button class="script-toggle" onclick="toggleScript('script1')">📝 Script 原文</button></div><div class="script-panel" id="script1">"I <span class="dm">was wondering</span> if you could <span class="dm">possibly</span> help me move these boxes to the storage room?"<br><span class="zh-block"><strong>信号词分析：</strong>"was wondering" + "possibly" = 礼貌请求。听到这两个词就知道说话人在<strong>求助</strong>，不是抱怨、不是告知。关键词：help, move, boxes, storage room。</span></div></div>

<div class="q-stem">What is the speaker doing?</div><div class="q-options" id="q1"><div class="q-option" onclick="checkAnswer('q1',0,2)">A) Complaining about heavy boxes</div><div class="q-option" onclick="checkAnswer('q1',1,2)">B) Explaining where the storage room is</div><div class="q-option" onclick="checkAnswer('q1',2,2)">C) Asking for help with a task</div></div><div class="q-feedback" id="q1-fb"></div>

<div class="audio-player" style="margin-top:20px"><div class="audio-controls"><button class="audio-btn play-btn" onclick="if(!isPlaying)speakText('The canteen will be closed for the next three days due to kitchen renovations. I just wanted to give everyone a heads up.',1)">▶</button><div class="audio-progress"><div class="audio-progress-fill"></div></div><span class="audio-time">~10s</span><button class="audio-speed" onclick="setSpeed(0.75,this)">0.75x</button><button class="audio-speed active" onclick="setSpeed(1,this)">1x</button><button class="audio-speed" onclick="setSpeed(1.25,this)">1.25x</button><button class="script-toggle" onclick="toggleScript('script2')">📝 Script</button></div><div class="script-panel" id="script2">"The canteen <span class="pr">will be closed</span> for the next three days <span class="pr">due to</span> kitchen renovations. I <span class="dm">just</span> wanted to give everyone a <span class="pr">heads up</span>."<br><span class="zh-block"><strong>改写分析：</strong>"will be closed"= 不开放, "due to" = 因为, "heads up" = 提前通知。整句话的目的：<strong>通知</strong>大家餐厅关闭。</span></div></div>

<div class="q-stem">What is the purpose of this announcement?</div><div class="q-options" id="q2"><div class="q-option" onclick="checkAnswer('q2',0,0)">A) To inform people about a closure</div><div class="q-option" onclick="checkAnswer('q2',1,0)">B) To complain about the kitchen staff</div><div class="q-option" onclick="checkAnswer('q2',2,0)">C) To ask for renovation volunteers</div></div><div class="q-feedback" id="q2-fb"></div>

<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0" style="margin-top:20px"><div class="tip-card-header"><div class="tip-card-icon">🔑</div><h4>Signal Words Cheat Sheet 信号词速查表</h4><span class="tip-card-tag">背下来</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><strong>Request 请求:</strong> <span class="dm">could you</span>... / <span class="dm">would you mind</span>... / <span class="dm">I was wondering if</span>...<br><strong>Apology 道歉:</strong> <span class="dm">I'm sorry</span>... / <span class="dm">I'm afraid</span>... / <span class="dm">unfortunately</span>...<br><strong>Suggestion 建议:</strong> <span class="dm">why don't we</span>... / <span class="dm">how about</span>... / <span class="dm">maybe we could</span>...<br><strong>Information 告知:</strong> <span class="dm">just to let you know</span>... / <span class="dm">I wanted to mention</span>... / <span class="dm">fyi</span>...<br><strong>Opinion 观点:</strong> <span class="dm">personally</span>... / <span class="dm">I reckon</span>... / <span class="dm">the way I see it</span>...<br><span class="zh-block"><strong>B1练习建议：</strong>先练前3类（请求/道歉/建议）。听到开头3个词就要判断类型——不用听完整个句子。</span></div></div></div>
</div>`,

3:`<div class="fade-in"><h2 class="section-title"><span class="highlight-purple">Paraphrase Recognition</span> <span class="zh-inline">同义改写识别</span></h2>
<p class="section-subtitle">The exam <span class="dm">never</span> uses the same words in the options as in the audio. You must recognise when two things mean the same. <span class="zh-inline">考试中选项永远不会用和音频一样的词——你必须识别同义表达。</span></p>

<div class="formula-box"><div class="formula-title">🔄 Common Paraphrase Patterns 常见改写模式</div><div class="formula-steps"><span class="formula-step" style="background:rgba(255,182,39,0.12)">Audio 原文</span><span class="formula-arrow">→</span><span class="formula-step" style="background:rgba(57,255,20,0.12)">Option 选项</span></div></div>

<div class="audio-player"><div class="audio-controls"><button class="audio-btn play-btn" onclick="if(!isPlaying)speakText('I'm afraid we have run out of the chicken sandwiches. Would you like to try the tuna instead?',1)">▶</button><div class="audio-progress"><div class="audio-progress-fill"></div></div><span class="audio-time">~9s</span><button class="audio-speed" onclick="setSpeed(0.75,this)">0.75x</button><button class="audio-speed active" onclick="setSpeed(1,this)">1x</button><button class="script-toggle" onclick="toggleScript('script3')">📝 Script</button></div><div class="script-panel" id="script3">"I'm afraid we <span class="pr">have run out of</span> the chicken sandwiches. Would you like to try the tuna <span class="pr">instead</span>?"<br><span class="zh-block"><strong>改写匹配：</strong>"have run out of" = no more / sold out。选项可能写 "The chicken sandwiches <strong>are no longer available</strong>"——完全不同的词，但意思相同。</span></div></div>

<div class="q-stem">What does the speaker say about the chicken sandwiches?</div><div class="q-options" id="q3"><div class="q-option" onclick="checkAnswer('q3',0,1)">A) They are more expensive than the tuna</div><div class="q-option" onclick="checkAnswer('q3',1,1)">B) They are no longer available</div><div class="q-option" onclick="checkAnswer('q3',2,1)">C) They will be ready in a few minutes</div></div><div class="q-feedback" id="q3-fb"></div>

<div class="audio-player" style="margin-top:20px"><div class="audio-controls"><button class="audio-btn play-btn" onclick="if(!isPlaying)speakText('Would it be alright if I handed in the assignment on Monday instead? I have been feeling a bit under the weather.',1)">▶</button><div class="audio-progress"><div class="audio-progress-fill"></div></div><span class="audio-time">~10s</span><button class="audio-speed" onclick="setSpeed(0.75,this)">0.75x</button><button class="audio-speed active" onclick="setSpeed(1,this)">1x</button><button class="script-toggle" onclick="toggleScript('script4')">📝 Script</button></div><div class="script-panel" id="script4">"Would it be alright if I <span class="pr">handed in</span> the assignment on Monday <span class="pr">instead</span>? I have been feeling <span class="pr">a bit under the weather</span>."<br><span class="zh-block"><strong>改写匹配：</strong>"handed in" = submitted, "instead" = rather than the original deadline, "a bit under the weather" = slightly unwell。选项可能写 "The speaker <strong>wants to submit</strong> the work later because they <strong>feel ill</strong>"——四个短语全部改写。</span></div></div>

<div class="q-stem">What is the speaker's request?</div><div class="q-options" id="q4"><div class="q-option" onclick="checkAnswer('q4',0,0)">A) To submit the assignment later due to illness</div><div class="q-option" onclick="checkAnswer('q4',1,0)">B) To change the assignment topic</div><div class="q-option" onclick="checkAnswer('q4',2,0)">C) To check the weather forecast</div></div><div class="q-feedback" id="q4-fb"></div>
</div>`,

4:`<div class="fade-in"><h2 class="section-title"><span class="highlight">Speaker Intent</span> <span class="zh-inline">说话人意图</span></h2>
<p class="section-subtitle">The hardest Part 1 questions: <span class="dm">why</span> is the speaker saying this? What's the <span class="pr">real purpose</span>? <span class="zh-inline">最难的Part 1题：说话人<strong>为什么</strong>说这个？真正的目的？</span></p>

<div class="audio-player"><div class="audio-controls"><button class="audio-btn play-btn" onclick="if(!isPlaying)speakText('You know, the library is actually much quieter on the top floor. Just saying.',1)">▶</button><div class="audio-progress"><div class="audio-progress-fill"></div></div><span class="audio-time">~7s</span><button class="audio-speed" onclick="setSpeed(0.75,this)">0.75x</button><button class="audio-speed active" onclick="setSpeed(1,this)">1x</button><button class="script-toggle" onclick="toggleScript('script5')">📝 Script</button></div><div class="script-panel" id="script5">"You know, the library is <span class="dm">actually</span> much quieter on the top floor. <span class="dm">Just saying</span>."<br><span class="zh-block"><strong>意图分析：</strong>"Just saying" = 我只是随便说说——但其实是<strong>委婉建议</strong>。说话人没有直接说"你应该去顶楼"，但暗示了。这是Part 1的高阶考点。</span></div></div>

<div class="q-stem">What is the speaker's intention?</div><div class="q-options" id="q5"><div class="q-option" onclick="checkAnswer('q5',0,2)">A) To complain about the noise level</div><div class="q-option" onclick="checkAnswer('q5',1,2)">B) To describe the library layout</div><div class="q-option" onclick="checkAnswer('q5',2,2)">C) To suggest moving to a quieter area</div></div><div class="q-feedback" id="q5-fb"></div>

<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0" style="margin-top:20px"><div class="tip-card-header"><div class="tip-card-icon">🧠</div><h4>The "Real Meaning" Decoder 真实含义解码器</h4><span class="tip-card-tag">进阶</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><strong>When they say 当听到:</strong><br>• "Just saying" / "No pressure" → <span class="pr">They ARE suggesting something</span> 其实在建议<br>• "I'm not sure if you've noticed..." → <span class="pr">They want you to notice something</span> 想让你注意到<br>• "It would be nice if..." → <span class="pr">They want it to happen</span> 希望发生<br>• "I don't want to bother you but..." → <span class="pr">They ARE about to bother you</span> 就要麻烦你了<br>• "To be honest..." → <span class="pr">They're about to say something direct</span> 要说直接的话<br><br><span class="zh-block"><strong>B1核心技巧：</strong>听到"暗示性"开头（Just saying / No pressure / To be honest）——立刻警觉。这不是闲聊，这是在用委婉方式表达真实意图。选项里最"直接"的往往是陷阱。</span></div></div></div>
</div>`,

5:`<div class="fade-in"><h2 class="section-title">L1 <span class="highlight-purple">Complete! 完成!</span></h2>
<div class="scene-card active" style="text-align:center"><div class="scene-icon">🎧</div><h3>Skills Unlocked 已解锁技能</h3><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:16px 0"><span class="formula-step" style="background:rgba(57,255,20,0.12)">🔑 Key Word Spotting 关键词</span><span class="formula-step" style="background:rgba(255,182,39,0.12)">🔄 Paraphrase 改写</span><span class="formula-step" style="background:rgba(179,71,234,0.12)">🎯 Intent 意图识别</span><span class="formula-step" style="background:rgba(0,212,255,0.1);color:var(--cyan)">⏱ Speed 速度适应</span></div></div>

<div class="video-wrapper" style="margin:20px 0"><iframe src="https://www.youtube.com/embed/cHrJke7YRKs" title="B2 Listening Test" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>
<p style="font-size:11px;color:var(--text-dim);text-align:center;margin-bottom:20px">📹 Extra: Full B2 Listening Test with Answers — practice at home</p>

<div class="tip-card" onclick="this.classList.toggle('expanded')" tabindex="0"><div class="tip-card-header"><div class="tip-card-icon">🏛️</div><h4>Part 1 Exam Day: What Actually Happens 考场实操</h4><span class="tip-card-tag">考前必读</span></div><div class="tip-card-body"><div class="tip-card-body-inner"><p class="procedure-list"><strong>1.</strong> You put on headphones. The audio plays <span class="pr">automatically</span> — no pause button, no rewind. <span class="zh-inline">戴上耳机。音频自动播放——没有暂停、没有回放。</span></p><p class="procedure-list" style="margin-top:8px"><strong>2.</strong> Each statement plays <span class="pr">once</span>. You have ~5 seconds after each to read 3 options and choose. <span class="zh-inline">每段只放一遍。之后约5秒看3个选项并选择。</span></p><p class="procedure-list" style="margin-top:8px"><strong>3.</strong> 6-8 questions in Part 1. Then a short pause before Part 2 begins. <span class="zh-inline">Part 1共6-8题。然后短暂停顿进入Part 2。</span></p><p style="margin-top:12px;font-size:12px;color:var(--amber)"><strong>💡 关键：</strong>你不能控制音频。如果某一题没听清——<strong>立刻猜一个然后忘掉</strong>。纠结一题会连累下一题。</p></div></div></div>

<div style="margin:20px 0"><div class="rubric-mini"><h5>📋 Final Self-Check 最终自查</h5><div class="checklist"><label class="checklist-item"><input type="checkbox"> I can identify key words in short statements</label><label class="checklist-item"><input type="checkbox"> I can recognise paraphrases in options</label><label class="checklist-item"><input type="checkbox"> I can tell the speaker's intention (request vs complaint vs suggestion)</label><label class="checklist-item"><input type="checkbox"> I know the 3 Part 1 question types</label><label class="checklist-item"><input type="checkbox"> I understand: audio plays ONCE, no pause, no rewind</label></div></div></div>
<p style="text-align:center;color:var(--text-dim);font-size:14px;margin-top:20px">L2: Conversations — tracking discourse markers, speaker attitude, and detail in real dialogue. <span class="zh-inline">下一课：对话——追踪语篇标记、说话人态度和细节。</span></p></div>`
};

function renderStep(n){
  currentStep=n;saveProgress();stopAudio();
  document.getElementById('stepContent').innerHTML=stepContent[n]||'';
  document.getElementById('stepIndicator').textContent='Step '+(n+1)+'/'+totalSteps;
  document.querySelectorAll('#stepsNav .step').forEach((el,i)=>{el.classList.remove('active','done');if(i<n)el.classList.add('done');if(i===n)el.classList.add('active')});
  document.getElementById('btnPrev').disabled=n===0;
  const nb=document.getElementById('btnNext');
  if(n===totalSteps-1){nb.textContent='Finish 🎉';nb.onclick=()=>{document.getElementById('completionModal').classList.add('show')}}
  else{nb.textContent='下一步 →';nb.onclick=()=>renderStep(n+1)}
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('btnPrev').onclick=()=>renderStep(currentStep-1);
document.getElementById('btnNext').onclick=()=>renderStep(currentStep+1);
document.querySelectorAll('#stepsNav .step').forEach(el=>{el.addEventListener('click',function(){renderStep(parseInt(this.dataset.step))})});
document.addEventListener('keydown',(e)=>{if(e.key==='ArrowRight'&&currentStep<totalSteps-1&&!e.target.closest('input,textarea'))renderStep(currentStep+1);if(e.key==='ArrowLeft'&&currentStep>0&&!e.target.closest('input,textarea'))renderStep(currentStep-1)});
renderStep(currentStep);
</script>
</body>
</html>
