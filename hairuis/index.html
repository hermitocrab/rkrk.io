<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>High Race 打卡系统</title>
<!-- 字体：英文标题 Anton / Bebas Neue + 正文 Inter + 中文品牌字站酷快乐体 -->
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
<!-- ECharts CDN -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
/* ============ 主题变量 ============ */
:root{
  --c-deep:#0A2540;       /* 深海蓝 */
  --c-pool:#00B8D9;       /* 泳池青 */
  --c-gold:#FFC857;       /* 强调金 */
  --c-bg:#F4FAFF;         /* 极浅蓝背景 */
  --c-ink:#0A2540;
  --c-mute:#5B6B82;
  --c-line:rgba(10,37,64,.08);
  --c-glass:rgba(255,255,255,.55);
  --c-glass-strong:rgba(255,255,255,.75);
  --shadow-sm:0 2px 6px rgba(10,37,64,.06);
  --shadow-md:0 8px 24px rgba(10,37,64,.10);
  --shadow-lg:0 24px 60px rgba(10,37,64,.18);
  --r-sm:8px; --r-md:14px; --r-lg:22px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Inter","Noto Sans SC",system-ui,-apple-system,sans-serif;
  color:var(--c-ink);
  background:var(--c-bg);
  overflow-x:hidden;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
button,input,textarea,select{font-family:inherit;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}

/* ============ 全站背景：水波纹 SVG + 泳道虚线 ============ */
.app-bg{
  position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(ellipse at 20% 0%,#dff3ff 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,#e7f7fb 0%,transparent 55%),
    var(--c-bg);
}
.app-bg::before{
  content:"";position:absolute;inset:0;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='40' viewBox='0 0 200 40'><path d='M0 20 Q25 0 50 20 T100 20 T150 20 T200 20' stroke='%2300B8D9' stroke-opacity='0.10' stroke-width='1.2' fill='none'/></svg>");
  background-size:200px 40px;
  animation:waveScroll 30s linear infinite;
  opacity:.6;
}
.app-bg::after{
  content:"";position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(180deg,transparent 0 119px,rgba(0,184,217,.07) 119px 120px);
  pointer-events:none;
}
@keyframes waveScroll{
  from{background-position:0 0}
  to{background-position:-2000px 0}
}

/* 顶部小字 */
.top-banner{
  position:fixed;top:0;left:0;right:0;z-index:60;
  font-size:11px;letter-spacing:.18em;
  text-align:center;padding:6px 12px;
  background:linear-gradient(90deg,#0A2540,#0E3B66 50%,#0A2540);
  color:#a9d4e6;
}
.top-banner b{color:var(--c-gold);letter-spacing:.2em}

/* ============ 主导航栏 ============ */
.navbar{
  position:fixed;top:28px;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  background:rgba(244,250,255,.55);
  border-bottom:1px solid var(--c-line);
}
.brand{display:flex;align-items:center;gap:14px}
.brand-mark{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,#0A2540 0%,#00B8D9 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-md);
  position:relative;overflow:hidden;
}
.brand-mark::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.5),transparent 40%);
}
.brand-mark svg{width:24px;height:24px;fill:#FFC857;position:relative;z-index:1}
.brand-text{display:flex;flex-direction:column;line-height:1.05}
.brand-text .en{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:.16em;color:var(--c-deep)}
.brand-text .cn{font-size:11px;letter-spacing:.32em;color:var(--c-mute)}
.nav-links{display:flex;gap:6px}
.nav-link{
  padding:8px 16px;border-radius:99px;font-size:13px;color:var(--c-mute);
  transition:.2s;font-weight:500;
}
.nav-link:hover{background:rgba(0,184,217,.08);color:var(--c-deep)}
.nav-link.active{background:var(--c-deep);color:#fff}
.nav-right{display:flex;align-items:center;gap:14px}
.dev-badge{
  font-size:11px;letter-spacing:.12em;
  padding:5px 12px;border-radius:99px;
  background:linear-gradient(135deg,#FFC857,#FFA624);
  color:#3a2200;font-weight:700;
  box-shadow:0 4px 14px rgba(255,200,87,.45);
}
.user-chip{
  display:flex;align-items:center;gap:8px;padding:6px 14px 6px 6px;
  border-radius:99px;background:rgba(255,255,255,.7);
  border:1px solid var(--c-line);box-shadow:var(--shadow-sm);
  font-size:13px;
}
.user-chip .avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#00B8D9,#0A2540);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
}
.btn-logout{
  font-size:12px;padding:6px 12px;border-radius:99px;
  border:1px solid var(--c-line);color:var(--c-mute);
}
.btn-logout:hover{color:#c0392b;border-color:#f5b9b3}

/* ============ 通用容器与按钮 ============ */
.app-main{padding:120px 28px 60px;max-width:1280px;margin:0 auto}
.glass{
  background:var(--c-glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.7);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-md);
}
.btn{
  position:relative;overflow:hidden;
  padding:12px 24px;border-radius:99px;font-weight:600;font-size:14px;
  display:inline-flex;align-items:center;gap:8px;justify-content:center;
  transition:transform .15s,box-shadow .2s;
}
.btn-primary{background:linear-gradient(135deg,#00B8D9,#0091B0);color:#fff;box-shadow:0 8px 22px rgba(0,184,217,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(0,184,217,.45)}
.btn-dark{background:var(--c-deep);color:#fff}
.btn-dark:hover{background:#0E3B66}
.btn-ghost{background:rgba(255,255,255,.6);border:1px solid var(--c-line);color:var(--c-deep)}
.btn-ghost:hover{background:#fff}
.btn-gold{background:linear-gradient(135deg,#FFC857,#FFA624);color:#3a2200;box-shadow:0 8px 22px rgba(255,200,87,.4)}
.btn-disabled,.btn:disabled{background:#cfd8e3 !important;color:#fff !important;box-shadow:none !important;cursor:not-allowed}
/* 涟漪 */
.btn .ripple{
  position:absolute;border-radius:50%;
  transform:scale(0);animation:ripple .6s linear;
  background:rgba(255,255,255,.55);pointer-events:none;
}
@keyframes ripple{to{transform:scale(3.5);opacity:0}}

input.field,textarea.field,select.field{
  width:100%;padding:12px 14px;border-radius:var(--r-md);
  border:1px solid var(--c-line);background:rgba(255,255,255,.7);
  font-size:14px;transition:.2s;
}
input.field:focus,textarea.field:focus,select.field:focus{
  outline:none;border-color:var(--c-pool);box-shadow:0 0 0 4px rgba(0,184,217,.12);background:#fff;
}
.label{font-size:12px;color:var(--c-mute);display:block;margin-bottom:6px;letter-spacing:.06em}

/* 标题 */
.h-en{font-family:"Bebas Neue",sans-serif;letter-spacing:.1em}
.section-title{
  display:flex;align-items:center;gap:14px;margin-bottom:20px;
}
.section-title .num{font-family:"Bebas Neue";font-size:28px;color:var(--c-pool)}
.section-title h2{font-size:22px;font-weight:700;color:var(--c-deep)}
.section-title .line{flex:1;height:1px;background:linear-gradient(90deg,var(--c-line),transparent)}

/* ============ 登录页 ============ */
.auth-wrap{
  min-height:calc(100vh - 90px);display:grid;grid-template-columns:1.1fr 1fr;gap:0;
  border-radius:0;overflow:hidden;
}
.auth-hero{
  position:relative;background:#0A2540;color:#fff;padding:60px 56px;
  display:flex;flex-direction:column;justify-content:space-between;
  background-image:linear-gradient(180deg,rgba(10,37,64,.55) 0%,rgba(10,37,64,.85) 100%),url("assets/hero_swimmer.jpg");
  background-size:cover;background-position:center;
  min-height:600px;
}
.auth-hero::after{
  content:"";position:absolute;left:0;right:0;bottom:0;height:6px;
  background:linear-gradient(90deg,transparent,#00B8D9 30%,#FFC857 70%,transparent);
  filter:blur(1px);
  box-shadow:0 0 18px #00B8D9;
}
.auth-hero .badge{
  display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.3em;
  color:#FFC857;
}
.auth-hero .badge .dot{width:6px;height:6px;border-radius:50%;background:#FFC857;box-shadow:0 0 10px #FFC857}
.auth-hero h1{
  font-family:"Anton","Bebas Neue","Inter",sans-serif;
  font-size:124px;line-height:.9;letter-spacing:.045em;margin-top:24px;
  font-weight:400;
  color:transparent;
  text-transform:uppercase;
  background:linear-gradient(180deg,#ffffff 0%,#dff9ff 34%,#58ddff 68%,#FFC857 128%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-stroke:.7px rgba(255,255,255,.82);
  text-shadow:
    0 16px 42px rgba(0,184,217,.62),
    0 0 24px rgba(255,255,255,.26),
    0 5px 0 rgba(10,37,64,.28);
}
.auth-hero h1 span{color:#00B8D9}
.auth-hero .cn-title{font-family:"Bebas Neue",sans-serif;font-size:44px;letter-spacing:.16em;margin-top:14px;color:#cfeaf3}
.auth-hero p{margin-top:18px;color:#cfeaf3;max-width:420px}
.auth-hero .meta{display:flex;gap:30px;margin-top:30px;font-size:13px;color:#9bc4d4}
.auth-hero .meta .v{font-family:"Bebas Neue";font-size:30px;color:#fff;letter-spacing:.06em}

.auth-form{padding:60px 56px;display:flex;flex-direction:column;justify-content:center;background:#fff}
.auth-form .tabs{display:flex;gap:0;margin-bottom:30px;border-bottom:1px solid var(--c-line)}
.auth-form .tabs button{padding:12px 0;margin-right:30px;font-size:15px;color:var(--c-mute);font-weight:600;position:relative}
.auth-form .tabs button.active{color:var(--c-deep)}
.auth-form .tabs button.active::after{
  content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--c-pool);border-radius:2px;
}
.auth-form h2{font-size:28px;margin-bottom:6px;color:var(--c-deep)}
.auth-form .sub{color:var(--c-mute);font-size:13px;margin-bottom:28px}
.auth-form .row{margin-bottom:18px}
.auth-form .actions{margin-top:8px}
.auth-form .tip{margin-top:18px;font-size:12px;color:var(--c-mute);line-height:1.7}

/* ============ Hero 与品牌展示 ============ */
.hero-pannel{
  position:relative;border-radius:var(--r-lg);overflow:hidden;color:#fff;
  background-image:linear-gradient(180deg,rgba(10,37,64,.45),rgba(10,37,64,.85)),url("assets/hero_swimmer.jpg");
  background-size:cover;background-position:center 30%;
  padding:48px 40px 38px;
  margin-bottom:28px;
  box-shadow:var(--shadow-lg);
}
.hero-pannel::before{
  content:"";position:absolute;left:0;right:0;bottom:0;height:3px;
  background:linear-gradient(90deg,transparent,#00B8D9,#FFC857,transparent);
  box-shadow:0 0 20px #00B8D9;
}
.hero-pannel .h-cn{font-size:15px;letter-spacing:.72em;color:#FFC857;text-transform:uppercase}
.hero-pannel .h-en{
  font-size:92px;letter-spacing:.065em;color:#fff;margin-top:8px;line-height:.88;
  text-shadow:0 10px 34px rgba(0,184,217,.42),0 0 1px rgba(255,255,255,.9);
  background:linear-gradient(180deg,#fff 0%,#d9f7ff 46%,#89eaff 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero-pannel .h-en em{
  font-style:normal;
  background:linear-gradient(180deg,#FFC857 0%,#fff0b8 42%,#00B8D9 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero-pannel .h-sub{margin-top:14px;color:#bcdcec;max-width:540px;font-size:14px}
.lane-divider{
  display:flex;align-items:center;gap:8px;margin-top:24px;
}
.lane-divider .ball{width:10px;height:10px;border-radius:50%;background:#FFC857;box-shadow:0 0 10px #FFC857}
.lane-divider .l{flex:1;height:2px;background:repeating-linear-gradient(90deg,#00B8D9 0 16px,transparent 16px 22px);border-radius:2px}

.home-brand-only{
  display:flex;align-items:center;justify-content:center;text-align:center;
  min-height:180px;margin-bottom:28px;padding:34px 24px;border-radius:var(--r-lg);
  background:linear-gradient(135deg,rgba(255,255,255,.76),rgba(213,246,255,.54));
  border:1px solid rgba(255,255,255,.86);box-shadow:var(--shadow-md);position:relative;overflow:hidden;
}
.home-brand-only::before{
  content:"";position:absolute;inset:-35%;
  background:conic-gradient(from 160deg,transparent,rgba(0,184,217,.18),transparent,rgba(255,200,87,.16),transparent);
  animation:brandGlow 12s linear infinite;
}
@keyframes brandGlow{to{transform:rotate(360deg)}}
.home-brand-only .inner{position:relative;z-index:1}
.home-brand-only .cn{
  display:none;
}
.home-brand-only .en{
  margin-top:0;font-family:"Bebas Neue",sans-serif;font-size:86px;letter-spacing:.18em;
  color:transparent;
  background:linear-gradient(180deg,#061d35 0%,#0A2540 38%,#00B8D9 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-stroke:.8px rgba(255,255,255,.42);
  text-shadow:0 12px 30px rgba(0,184,217,.18),0 2px 0 rgba(255,255,255,.72);
  position:relative;
}
.home-brand-only .en::after{
  content:"";display:block;width:120px;height:3px;margin:14px auto 0;
  border-radius:99px;background:linear-gradient(90deg,transparent,var(--c-gold),var(--c-pool),transparent);
  box-shadow:0 0 18px rgba(0,184,217,.35);
}

/* ============ 角色选择 ============ */
.role-wrap{max-width:880px;margin:0 auto;text-align:center}
.role-wrap h2{font-size:30px;color:var(--c-deep);margin-top:40px}
.role-wrap p.sub{color:var(--c-mute);margin-top:8px;margin-bottom:36px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.role-card{
  position:relative;padding:36px 28px;border-radius:var(--r-lg);
  background:var(--c-glass-strong);
  border:1px solid rgba(255,255,255,.7);
  box-shadow:var(--shadow-md);
  cursor:pointer;transition:.25s;
  text-align:left;overflow:hidden;
}
.role-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--c-pool)}
.role-card .icon{
  width:64px;height:64px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:20px;
}
.role-card.athlete .icon{background:linear-gradient(135deg,#00B8D9,#0A2540)}
.role-card.coach .icon{background:linear-gradient(135deg,#0A2540,#FFC857)}
.role-card h3{font-size:22px;margin-bottom:8px;color:var(--c-deep)}
.role-card p{color:var(--c-mute);font-size:13px;line-height:1.7}
.role-card .arrow{position:absolute;right:24px;top:24px;color:var(--c-pool);font-size:20px}
.role-card::after{
  content:"";position:absolute;right:-30px;bottom:-30px;width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,184,217,.16),transparent 70%);
}

/* ============ 模态框 ============ */
.modal-mask{
  position:fixed;inset:0;background:rgba(10,37,64,.55);backdrop-filter:blur(6px);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .2s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:#fff;border-radius:var(--r-lg);padding:32px;max-width:480px;width:100%;
  box-shadow:var(--shadow-lg);animation:popIn .25s;position:relative;
}
@keyframes popIn{from{transform:translateY(20px) scale(.96);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.modal h3{font-size:20px;margin-bottom:8px;color:var(--c-deep)}
.modal .desc{color:var(--c-mute);font-size:13px;margin-bottom:20px}
.modal .row{margin-bottom:14px}
.modal .footer{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}
.modal .close{position:absolute;right:16px;top:14px;font-size:24px;color:var(--c-mute)}

/* ============ 队员端 - 群聊 ============ */
.layout{display:grid;grid-template-columns:240px 1fr;gap:24px}
.side{
  border-radius:var(--r-lg);padding:18px;
  background:var(--c-glass-strong);
  border:1px solid rgba(255,255,255,.7);
  box-shadow:var(--shadow-sm);
  height:fit-content;position:sticky;top:120px;
}
.side h4{font-size:12px;letter-spacing:.18em;color:var(--c-mute);margin-bottom:12px}
.side .menu{display:flex;flex-direction:column;gap:4px}
.side .menu a{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
  font-size:14px;color:var(--c-deep);transition:.2s;font-weight:500;
}
.side .menu a:hover{background:rgba(0,184,217,.08)}
.side .menu a.active{background:var(--c-deep);color:#fff;box-shadow:var(--shadow-sm)}
.side .menu a .red-dot{
  margin-left:auto;width:8px;height:8px;border-radius:50%;background:#ff4757;
  box-shadow:0 0 8px rgba(255,71,87,.6);
}
.side .menu a svg{width:16px;height:16px}

.chat-room{
  border-radius:var(--r-lg);min-height:600px;
  background:var(--c-glass-strong);border:1px solid rgba(255,255,255,.7);
  box-shadow:var(--shadow-md);overflow:hidden;display:flex;flex-direction:column;
}
.chat-head{
  padding:18px 24px;border-bottom:1px solid var(--c-line);
  display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,.5);
}
.chat-head .group-ico{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,#00B8D9,#0A2540);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;
}
.chat-head h3{font-size:16px}
.chat-head .meta{font-size:12px;color:var(--c-mute);margin-top:2px}

.chat-body{flex:1;padding:24px;overflow-y:auto;background:linear-gradient(180deg,rgba(244,250,255,.4),rgba(232,246,251,.4))}
.chat-msg{display:flex;gap:12px;margin-bottom:22px}
.chat-msg .avatar{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#0A2540,#00B8D9);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
}
.chat-msg.coach .avatar{background:linear-gradient(135deg,#FFC857,#0A2540);color:#fff}
.chat-msg .bubble-wrap{max-width:560px}
.chat-msg .who{font-size:12px;color:var(--c-mute);margin-bottom:4px}
.chat-msg .who b{color:var(--c-deep);margin-right:8px}
.chat-msg .bubble{
  background:#fff;border-radius:14px;padding:14px 16px;border:1px solid var(--c-line);
  box-shadow:var(--shadow-sm);font-size:14px;line-height:1.7;
}
.chat-msg.system .bubble{background:linear-gradient(135deg,#0A2540,#0E3B66);color:#fff;border-color:transparent}
.chat-msg .plan-card{
  margin-top:10px;border-left:3px solid var(--c-pool);padding:10px 14px;
  background:rgba(0,184,217,.06);border-radius:0 10px 10px 0;font-size:13px;color:var(--c-mute);
}
.chat-msg .actions{margin-top:10px;display:flex;gap:10px;align-items:center}
.chat-msg .deadline{font-size:12px;color:#c0392b}
.chat-msg.dm{justify-content:flex-end}
.chat-msg.dm .bubble{background:linear-gradient(135deg,#FFC857,#FFA624);color:#3a2200;border:none}
.chat-msg.dm .avatar{background:linear-gradient(135deg,#FFC857,#FFA624);color:#3a2200;order:2}
.chat-msg.dm .bubble-wrap{order:1;text-align:right}

.empty-state{
  text-align:center;padding:60px 20px;color:var(--c-mute);
}
.empty-state .ico{font-size:50px;opacity:.4;margin-bottom:14px}

/* ============ 视频上传页 ============ */
.upload-card{padding:32px;max-width:720px;margin:0 auto}
.upload-card h2{font-size:24px;color:var(--c-deep);margin-bottom:6px}
.upload-card .plan-quote{
  margin:14px 0 24px;padding:14px 16px;background:rgba(0,184,217,.08);

<body>

<!-- 全站背景 -->
<div class="app-bg"></div>

<!-- 顶部小字 -->
<div class="top-banner">📡 实时同步 · 数据云端存储 · 7天自动清理 &nbsp;|&nbsp; <b>High Race</b></div>

<!-- 导航栏（运行时根据登录状态渲染） -->
<nav class="navbar" id="navbar"></nav>

<!-- 主内容容器（路由渲染） -->
<main class="app-main" id="app"></main>

<!-- 模态框容器 -->
<div id="modalBox"></div>
<!-- toast -->
<div id="toastBox"></div>

<script>
/* ============================================================
 *  海瑞斯 · High Race 打卡系统 - 单文件前端原型
 *  数据存储：后端 API (SQLite) + IndexedDB (视频)
 *  路由：hash 路由
 *  前端原型
 * ============================================================ */

/* ---------- 工具：UUID / 日期 / Toast / 涟漪 ---------- */
const uuid=()=>([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));
const pad2=n=>String(n).padStart(2,'0');
const fmtDate=d=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const fmtTime=d=>`${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
const fmtFull=d=>`${fmtDate(d)} ${fmtTime(d)}`;
const todayStr=()=>fmtDate(new Date());
const endOfTodayMs=()=>{const d=new Date();d.setHours(23,59,59,999);return d.getTime()};

function toast(msg,type='info'){
  const box=document.getElementById('toastBox');
  const t=document.createElement('div');
  t.className='toast '+(type||'');
  t.textContent=msg;
  box.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(40px)';t.style.transition='.3s'},2400);
  setTimeout(()=>t.remove(),2800);
}

/* 涟漪点击效果（事件委托） */
document.addEventListener('click',e=>{
  const btn=e.target.closest('.btn');
  if(!btn) return;
  const r=btn.getBoundingClientRect();
  const span=document.createElement('span');
  span.className='ripple';
  const size=Math.max(r.width,r.height);
  span.style.width=span.style.height=size+'px';
  span.style.left=(e.clientX-r.left-size/2)+'px';
  span.style.top=(e.clientY-r.top-size/2)+'px';
  btn.appendChild(span);
  setTimeout(()=>span.remove(),650);
});

/* ---------- API 后端数据库 (替换 localStorage) ----------
 * 内存缓存 + API 写入，读取同步，写入异步。
 * session / lastUser / devmode / deviceId 保留在 localStorage（本地偏好） */
const API_BASE=window.location.origin+'/api';
const DB={
  K:{users:'users',plans:'plans',submissions:'submissions',feedback:'feedback',reminders:'reminders',messages:'messages',session:'hr_session',lastUser:'hr_last_user',devmode:'hr_devmode'},
  _cache:{users:null,plans:null,submissions:null,feedback:null,reminders:null,messages:null},
  _ready:false,
  _api(collection,method,body){return fetch(API_BASE+'/'+collection+(method==='GET'?'':'/'+(body?.id||'')),{method,headers:{'Content-Type':'application/json'},body:method!=='GET'&&method!=='DELETE'?JSON.stringify(body):undefined}).then(r=>r.json()).catch(e=>console.warn('API err:',e))},
  _load(k){const map={users:'users',plans:'plans',submissions:'submissions',feedback:'feedback',reminders:'reminders',messages:'messages'};const c=map[k];if(!c)return;return fetch(API_BASE+'/'+c).then(r=>r.json()).then(d=>{this._cache[k]=d;return d})},
  async init(){try{const r=await fetch(API_BASE+'/sync');const d=await r.json();this._cache.users=d.users||[];this._cache.plans=d.plans||[];this._cache.submissions=d.submissions||[];this._cache.feedback=d.feedback||[];this._cache.reminders=d.reminders||[];this._cache.messages=d.messages||[];this._ready=true;console.log('DB: loaded '+this._cache.users.length+' users, '+this._cache.submissions.length+' submissions')}catch(e){console.warn('DB init failed, using empty cache',e);this._ready=true}},
  get(k,fb){if(['hr_session','hr_last_user','hr_devmode'].includes(k)){try{return JSON.parse(localStorage.getItem(k))??fb}catch(e){return fb}}return this._cache[k]??fb??[]},
  set(k,v){if(['hr_session','hr_last_user','hr_devmode'].includes(k)){localStorage.setItem(k,JSON.stringify(v));return}this._cache[k]=v;const map={users:'users',plans:'plans',submissions:'submissions',feedback:'feedback',reminders:'reminders',messages:'messages'};const c=map[k];if(c){const data=v.filter?{users:undefined,plans:undefined,submissions:undefined,feedback:undefined,reminders:undefined,messages:undefined,[c]:v}:{};fetch(API_BASE+'/sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).catch(()=>{})}},
  push(k,item){const arr=this.get(k,[]);arr.push(item);this.set(k,arr);return item},
  deviceId(){let id=localStorage.getItem('hr_device_id');if(!id){id=uuid();localStorage.setItem('hr_device_id',id)}return id}
};

/* ---------- 大视频存储：IndexedDB ----------
 * localStorage 容量很小，不适合 30 分钟左右的视频。
 * 视频 Blob 存入 IndexedDB，localStorage 只保存提交记录与 videoKey。
 */
const VIDEO_STORE={
  db:null,
  open(){
    if(this.db) return Promise.resolve(this.db);
    return new Promise((resolve,reject)=>{
      const req=indexedDB.open('hr_video_store',1);
      req.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('videos')) db.createObjectStore('videos');
      };
      req.onsuccess=e=>{this.db=e.target.result;resolve(this.db)};
      req.onerror=()=>reject(req.error);
    });
  },
  async save(key,blob){
    const db=await this.open();
    return new Promise((resolve,reject)=>{
      const tx=db.transaction('videos','readwrite');
      tx.objectStore('videos').put(blob,key);
      tx.oncomplete=resolve;
      tx.onerror=()=>reject(tx.error);
    });
  },
  async get(key){
    const db=await this.open();
    return new Promise((resolve,reject)=>{
      const tx=db.transaction('videos','readonly');
      const req=tx.objectStore('videos').get(key);
      req.onsuccess=()=>resolve(req.result||null);
      req.onerror=()=>reject(req.error);
    });
  }
};

function videoTag(s,attrs=''){
  if(s.videoData) return `<video src="${s.videoData}" controls ${attrs}></video>`;
  return `<video data-video-key="${s.videoKey||''}" controls ${attrs}></video>`;
}
async function hydrateVideos(root=document){
  const vids=[...root.querySelectorAll('video[data-video-key]')];
  for(const v of vids){
    if(v.dataset.loaded) continue;
    const key=v.dataset.videoKey;
    if(!key) continue;
    try{
      const blob=await VIDEO_STORE.get(key);
      if(blob){
        v.src=URL.createObjectURL(blob);
        v.dataset.loaded='1';
      }
    }catch(e){
      console.warn('视频读取失败',e);
    }
  }
}

/* ---------- 内置数据初始化 ---------- */
(async function seed(){
  await DB.init();
  // Ensure empty defaults
  if(!DB.get(DB.K.users).length) DB.set(DB.K.users,[]);
  if(!DB.get(DB.K.plans).length) DB.set(DB.K.plans,[]);
  if(!DB.get(DB.K.submissions).length) DB.set(DB.K.submissions,[]);
  if(!DB.get(DB.K.feedback).length) DB.set(DB.K.feedback,[]);
  if(!DB.get(DB.K.reminders).length) DB.set(DB.K.reminders,[]);
  if(!DB.get(DB.K.messages).length) DB.set(DB.K.messages,[]);
  // Trigger initial render
  if(!location.hash) location.hash='#/login';
  window.dispatchEvent(new HashChangeEvent('hashchange'));
})();

/* ---------- Session ---------- */
function currentUser(){
  const s=DB.get(DB.K.session);
  if(!s) return null;
  const u=DB.get(DB.K.users,[]).find(u=>u.id===s.userId)||null;
  if(u&&u.username===DEV_USER) return {...u,name:'High Race Admin'};
  return u;
}
function setSession(userId){
  DB.set(DB.K.session,{userId,loginAt:Date.now()});
  // 同时记录最近账号，用于下一次登录页自动回填
  const u=DB.get(DB.K.users,[]).find(x=>x.id===userId);
  if(u) localStorage.setItem(DB.K.lastUser,u.username);
}
function logout(){
  if(!confirm('确定退出登录吗？\n\n你的账号信息与所有打卡记录都会保留，下次仍可登录查看。')) return;
  // 仅清除当前会话；账号、设备绑定、打卡归档全部保留
  localStorage.removeItem(DB.K.session);
  localStorage.removeItem(DB.K.devmode);
  location.hash='#/login';render();
}

/* ---------- 教练姓名校验 ---------- */
const ALLOWED_COACH=['淘教','蒲教'];
const DEV_USER='卿城';

/* ============================================================
 *  路由 & 渲染
 * ============================================================ */
function render(){
  if(!DB._ready) return; // Wait for DB init
  const u=currentUser();
  const hash=location.hash||'#/login';
  // 强制路由保护
  if(!u && !hash.startsWith('#/login')){
    location.hash='#/login';return;
  }
  if(u && hash.startsWith('#/login')){
    if(!u.role) location.hash='#/role';
    else location.hash=getHomeFor(u);
    return;
  }
  if(u && !u.role && !hash.startsWith('#/role')&& !hash.startsWith('#/dev')){
    location.hash='#/role';return;
  }
  renderNav();
  const app=document.getElementById('app');
  app.innerHTML='';
  if(hash==='#/login') return viewLogin(app);
  if(hash==='#/role') return viewRole(app);
  if(hash==='#/dev') return viewDevSwitch(app);
  if(hash.startsWith('#/student')) return viewStudent(app,hash);
  if(hash.startsWith('#/coach')) return viewCoach(app,hash);
  app.innerHTML='<div class="glass" style="padding:40px;text-align:center">页面不存在</div>';
}
window.addEventListener('hashchange',render);

function getHomeFor(u){
  // 开发者账号 -> 默认进入 dev 选择面板
  if(u.username===DEV_USER) return '#/dev';
  if(u.role==='coach') return '#/coach/plans';
  return '#/student/group';
}

/* ============ 导航栏 ============ */
function renderNav(){
  const nav=document.getElementById('navbar');
  const u=currentUser();
  const hash=location.hash||'#/login';
  const devMode=DB.get(DB.K.devmode);

  // 根据角色生成菜单
  let links='';
  if(u && u.role){
    const isDev=u.username===DEV_USER;
    let role=u.role;
    if(isDev && devMode) role=devMode;
    if(role==='student'){
      links=`
        <a class="nav-link ${hash.startsWith('#/student/group')?'active':''}" href="#/student/group">群聊</a>
        <a class="nav-link ${hash.startsWith('#/student/calendar')?'active':''}" href="#/student/calendar">日历</a>
        <a class="nav-link ${hash.startsWith('#/student/ranking')?'active':''}" href="#/student/ranking">排行榜</a>
        <a class="nav-link ${hash.startsWith('#/student/dm')?'active':''}" href="#/student/dm">私信</a>
      `;
    }else{

function doLogin(){
  const username=document.getElementById('lgUser').value.trim();
  const password=document.getElementById('lgPass').value;
  if(!username||!password){toast('请填写账号密码','error');return}
  const users=DB.get(DB.K.users,[]);
  const u=users.find(x=>x.username===username);
  if(!u){toast('账号不存在，请先注册','error');return}
  if(u.password!==password){toast('密码错误','error');return}
  // 设备校验
  const did=DB.deviceId();
  if(u.deviceId && u.deviceId!==did){
    toast('该账号已在其他设备激活','error');return;
  }
  if(!u.deviceId){u.deviceId=did;DB.set(DB.K.users,users)}
  setSession(u.id);
  toast('登录成功','success');
  if(!u.role) location.hash='#/role';
  else location.hash=getHomeFor(u);
}
function doRegister(){
  const username=document.getElementById('rgUser').value.trim();
  const password=document.getElementById('rgPass').value;
  const password2=document.getElementById('rgPass2').value;
  if(!username||!password){toast('请填写账号密码','error');return}
  if(password.length<4){toast('密码至少 4 位','error');return}
  if(password!==password2){toast('两次密码不一致','error');return}
  const users=DB.get(DB.K.users,[]);
  if(users.some(x=>x.username===username)){toast('用户名已存在','error');return}
  const did=DB.deviceId();
  const u={id:uuid(),username,password,deviceId:did,role:null,name:'',createdAt:Date.now()};
  users.push(u);
  DB.set(DB.K.users,users);
  setSession(u.id);
  toast('注册成功，请选择角色','success');
  location.hash='#/role';
}

function countMySubmissions(sid){return DB.get(DB.K.submissions,[]).filter(x=>x.studentId===sid).length}

function getStudentStreak(studentId){
  const subs=DB.get(DB.K.submissions,[]).filter(s=>s.studentId===studentId);
  const days=new Set(subs.map(s=>fmtDate(new Date(s.createdAt))));
  const today=todayStr();
  const cursor=new Date();
  let checkedToday=days.has(today);
  if(!checkedToday) cursor.setDate(cursor.getDate()-1);
  let streak=0;
  while(days.has(fmtDate(cursor))){
    streak++;
    cursor.setDate(cursor.getDate()-1);
  }
  return {streak,checkedToday,totalDays:days.size,lastDay:[...days].sort().pop()||''};
}

function getLeaderboardRows(){
  const students=DB.get(DB.K.users,[]).filter(u=>u.role==='student');
  return students.map(u=>{
    const stat=getStudentStreak(u.id);
    return {...u,...stat};
  }).sort((a,b)=>b.streak-a.streak || b.totalDays-a.totalDays || (a.name||a.username).localeCompare(b.name||b.username,'zh-Hans-CN'));
}

      <div style="font-size:12px;color:var(--c-mute);margin-top:8px">已改用 IndexedDB 存储大视频，适合选择约 30 分钟左右的视频。实际可用容量取决于当前浏览器和设备空间。</div>
    </div>
    <div id="afterRec"></div>
  `;
  document.getElementById('fileInput').onchange=e=>{
    const f=e.target.files[0];if(!f) return;
    videoBlob=f;showAfter();
  };
  function showAfter(){
    if(!videoBlob) return;
    const url=URL.createObjectURL(videoBlob);
    const expired=Date.now()>plan.deadlineMs;
    document.getElementById('afterRec').innerHTML=`
      <div class="video-preview"><video src="${url}" controls></video></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-ghost" id="btnClearVideo">清空当前视频</button>
        <button class="btn btn-dark" id="btnRetake">重新选择</button>
        <button class="btn btn-primary" id="btnSubmit" ${expired?'disabled':''}>${expired?'已过期 (无法提交)':'提交给 '+plan.coachName+' 教练'}</button>
      </div>
    `;
    document.getElementById('btnClearVideo').onclick=()=>{
      videoBlob=null;
      document.getElementById('afterRec').innerHTML='';
      const file=document.getElementById('fileInput');
      if(file) file.value='';
      toast('已清空当前视频','success');
    };
    document.getElementById('btnRetake').onclick=()=>{
      videoBlob=null;
      document.getElementById('afterRec').innerHTML='';
      const file=document.getElementById('fileInput');
      if(file) file.click();
    };
    if(!expired){
      document.getElementById('btnSubmit').onclick=async()=>{
        const btn=document.getElementById('btnSubmit');
        btn.disabled=true;
        btn.textContent='正在保存视频…';
        try{
          const videoKey='video_'+uuid();
          await VIDEO_STORE.save(videoKey,videoBlob);
          const sub={
            id:uuid(),planId:plan.id,studentId:me.id,studentName:me.name,
            videoKey,
            videoName:videoBlob.name||'record.webm',
            videoSize:videoBlob.size||0,
            videoType:videoBlob.type||'video/webm',
            createdAt:Date.now()
          };
          const arr=DB.get(DB.K.submissions,[]);
          arr.push(sub);DB.set(DB.K.submissions,arr);
          toast('已私信发送给 '+plan.coachName+' 教练','success');
          setTimeout(()=>{location.hash='#/student/group'},800);
        }catch(e){
          btn.disabled=false;
          btn.textContent='提交给 '+plan.coachName+' 教练';
          toast('视频保存失败：浏览器存储空间不足或权限受限','error');
        }
      };
    }
  }
}

function publishPlan(){
  const me=currentUser();
  const content=document.getElementById('planContent').value.trim();
  if(!content){toast('请填写计划内容','error');return}
  const trainingAtValue=document.getElementById('trainingAt').value;
  const trainingAt=trainingAtValue?new Date(trainingAtValue).getTime():null;
  const pane=document.getElementById('schedulePane');
  const now=Date.now();
  if(pane.dataset.mode==='now'){
    const plan={
      id:uuid(),coachId:me.id,coachName:me.name,
      content,publishAt:now,trainingAt,
      deadlineMs:endOfTodayMs(),
      scheduled:false
    };
    DB.push(DB.K.plans,plan);
    toast('计划已下发到群聊','success');
  }else{
    const s=document.getElementById('schStart').value;
    const e=document.getElementById('schEnd').value;
    const t=document.getElementById('schTime').value;
    if(!s||!e||!t){toast('请填写完整定时设置','error');return}
    if(new Date(e)<new Date(s)){toast('结束日期不能早于起始日期','error');return}
    // 定时任务：保存为模板，setInterval 检查到点后写入消息流
    const plan={
      id:uuid(),coachId:me.id,coachName:me.name,
      content,publishAt:now,trainingAt, // 占位
      deadlineMs:endOfTodayMs(),
      scheduled:true,
      scheduleStart:s,scheduleEnd:e,scheduleHHMM:t,
      lastFireDate:''
    };
    DB.push(DB.K.plans,plan);
    toast('已设置定时任务，到点将自动下发','success');
  }
  document.getElementById('planContent').value='';
  document.getElementById('trainingAt').value='';
  setTimeout(()=>render(),200);
}
function deletePlan(id){
  if(!confirm('确定要删除此计划吗？')) return;
  const arr=DB.get(DB.K.plans,[]).filter(p=>p.id!==id);
  DB.set(DB.K.plans,arr);
  toast('已删除','success');
  render();
}

/* 定时调度器：每 30 秒检查一次定时计划是否需要下发 */
setInterval(()=>{
  const plans=DB.get(DB.K.plans,[]);
  let changed=false;
  const now=new Date();
  const nowDate=fmtDate(now);
  const nowHHMM=fmtTime(now);
  plans.forEach(p=>{
    if(!p.scheduled) return;
    if(nowDate<p.scheduleStart||nowDate>p.scheduleEnd) return;
    if(nowHHMM<p.scheduleHHMM) return;
    if(p.lastFireDate===nowDate) return;
    // 触发：写入一条新计划消息（克隆为已发送状态）
    const fire={
      id:uuid(),coachId:p.coachId,coachName:p.coachName,
      content:p.content+'\n[本条由定时任务自动下发 · '+nowDate+' '+nowHHMM+']',
      publishAt:Date.now(),trainingAt:p.trainingAt,
      deadlineMs:endOfTodayMs(),
      scheduled:false,
      fromScheduleId:p.id
    };
    plans.push(fire);
    p.lastFireDate=nowDate;
    changed=true;
  });
  if(changed){
    DB.set(DB.K.plans,plans);
    if(location.hash.startsWith('#/student/group')||location.hash.startsWith('#/coach/plans')) render();
  }
},30000);

          <div class="stat-card gold"><div class="lab">RATE</div><div class="v">${rate}%</div><div class="desc">今日打卡率</div></div>
        </div>

          <div class="chart-card"><h4>今日打卡率</h4><div class="chart-box" id="chartRate"></div></div>
          <div class="chart-card"><h4>近 7 天打卡量</h4><div class="chart-box" id="chartWeek"></div></div>
        </div>
        <div class="glass" style="padding:24px">
          <div class="section-title"><span class="num">03</span><h2>今日未提交队员</h2><span class="line"></span></div>
          ${total===0?'<div class="empty-state"><div class="ico">👥</div>暂无队员</div>':`

              ${users.filter(u=>!todayUserSet.has(u.id)).map(u=>`

            </div>
          `}
        </div>
      </div>
    </div>
  `;
  // 渲染图表
  const c1=echarts.init(document.getElementById('chartRate'));
  c1.setOption({
    series:[{
      type:'gauge',startAngle:90,endAngle:-270,radius:'85%',
      pointer:{show:false},
      progress:{show:true,overlap:false,roundCap:true,clip:false,
        itemStyle:{color:{type:'linear',x:0,y:0,x2:1,y2:1,colorStops:[{offset:0,color:'#00B8D9'},{offset:1,color:'#0A2540'}]}}},
      axisLine:{lineStyle:{width:18,color:[[1,'#e8eef5']]}},
      splitLine:{show:false},axisTick:{show:false},axisLabel:{show:false},
      data:[{value:rate,name:'打卡率'}],

    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},splitLine:{lineStyle:{type:'dashed',color:'#e1e8ef'}},axisLabel:{color:'#5B6B82'}},

function sendFeedback(submissionId){
  const me=currentUser();
  const s=DB.get(DB.K.submissions,[]).find(x=>x.id===submissionId);
  if(!s) return;
  openModal({
    title:`发送反馈给 ${s.studentName}`,
    body:`<div class="row"><label class="label">反馈内容</label><textarea class="field" id="fbContent" rows="4" placeholder="例：动作幅度OK，注意打腿节奏，建议增加踝关节柔韧训练。"></textarea></div>`,
    confirm:'发送私信',
    onConfirm:()=>{
      const content=document.getElementById('fbContent').value.trim();
      if(!content){toast('请输入反馈内容','error');return false}
      DB.push(DB.K.feedback,{
        id:uuid(),submissionId,studentId:s.studentId,
        coachId:me.id,coachName:me.name,
        content,createdAt:Date.now(),read:false
      });
      toast('反馈已私信发送','success');
      return true;
    }
  });
}

function openModal({title,body,confirm='确定',cancel='取消',onConfirm}){
  const box=document.getElementById('modalBox');
  box.innerHTML=`
    <div class="modal-mask">
      <div class="modal">
        <button class="close" onclick="closeModal()">×</button>
        <h3>${title}</h3>
        <div class="desc"></div>
        <div>${body}</div>
        <div class="footer">
          ${cancel?`<button class="btn btn-ghost" onclick="closeModal()">${cancel}</button>`:''}
          ${confirm?`<button class="btn btn-primary" id="modConfirmBtn">${confirm}</button>`:''}
        </div>
      </div>
    </div>
  `;
  if(confirm){
    document.getElementById('modConfirmBtn').onclick=()=>{
      const ok=onConfirm?onConfirm():true;
      if(ok!==false) closeModal();
    };
  }
  setTimeout(()=>hydrateVideos(box),0);
}
function closeModal(){document.getElementById('modalBox').innerHTML=''}
